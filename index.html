狀？", "A": "體重減輕", "B": "便秘", "C": "心跳加速", "D": "皮膚冒汗", "year": 113, "ans": "B", "id": "113-57"}, {"num": 58, "q": "35歲病人因持續疲倦、食慾不振、體重減輕和皮膚變黑就診，檢驗結果顯示低鈉血症。 下列何者為最可能的臆斷？", "A": "甲狀腺功能低下", "B": "皮質醇過多症", "C": "愛迪生氏病", "D": "甲狀腺功能亢進", "year": 113, "ans": "C", "id": "113-58"}, {"num": 59, "q": "42歲女性BMI 30kg/m2，最近常會出現右側前臂和大魚際肌區域的疼痛，打電腦時症狀 會更嚴重，並伴隨有痠麻的感覺，近3個月喝水時常常覺得手部無力，茶杯也常握不穩。 下列何者為最可能的臆斷？", "A": "急性腦中風", "B": "第五頸椎壓迫", "C": "腕隧道症候群", "D": "尺神經損傷", "year": 113, "ans": "C", "id": "113-59"}, {"num": 60, "q": "75 歲男性無特殊過去病史且未服用任何藥物，突發性頭暈，覺得天旋地轉且走路不穩， 檢查發現左側眼瞼下垂，左側臉部及右側肢體對輕觸不敏感，喝水容易嗆咳，肌力無異 常，但走路時較易向左側傾斜。下列何者為最可能之臆斷？", "A": "良性陣發性眩暈", "B": "小腦中風", "C": "腦幹中風", "D": "急性前庭炎", "year": 113, "ans": "C", "id": "113-60"}, {"num": 61, "q": "有關急性橋腦出血之病人，下列何者為最常出現之症狀？", "A": "深度昏迷合併四肢癱瘓", "B": "同側偏盲", "C": "平衡能力差", "D": "兩側瞳孔不等大", "year": 113, "ans": "A", "id": "113-61"}, {"num": 62, "q": "下列何者為偏頭痛之病理生理機轉？", "A": "頸部及頭部肌肉廣泛性收縮造成張力太強", "B": "大腦疼痛控制區域之血管擴張", "C": "腦幹和下視丘中單胺類感覺控制系統功能障礙", "D": "顏面神經進入橋腦時被周邊組織過度壓迫", "year": 113, "ans": "C", "id": "113-62"}, {"num": 63, "q": "有關主動脈剝離臨床表現之敘述，下列何者較為正確？", "A": "大部份病人的血壓偏低", "B": "若疼痛由背部轉移至前胸則可完全排除", "C": "不會造成異常的心雜音", "D": "可能出現腳麻症狀", "year": 113, "ans": "D", "id": "113-63"}, {"num": 64, "q": "有關下肢動脈阻塞之敘述，下列何者正確？", "A": "休息時腳會較為痠痛，活動時較為舒服", "B": "下肢脈搏正常但感覺異常", "C": "下肢腫脹但溫度正常", "D": "踝肱血壓比值 ( ankle - brachial index ) 常小於 0.9", "year": 113, "ans": "D", "id": "113-64"}, {"num": 65, "q": "75歲病人因呼吸喘而就醫，發現胸骨右側上緣有強度3級之收縮期心雜音，下列何者為 最可能的臆斷？", "A": "肺動脈瓣膜狹窄", "B": "主動脈瓣膜狹窄", "C": "肺動脈瓣膜閉鎖不全", "D": "主動脈瓣膜閉鎖不全", "year": 113, "ans": "B", "id": "113-65"}, {"num": 66, "q": "20歲男性病人因1小時前出現突發性左胸痛及漸進性呼吸困難，身體診察發現左側呼吸音 減弱、叩診有鼓音、觸覺震顫減弱，下列何者為最可能的臆斷？", "A": "肺栓塞", "B": "肋膜積液", "C": "肺水腫", "D": "張力性氣胸", "year": 113, "ans": "D", "id": "113-66"}, {"num": 67, "q": "有關闌尾炎之敘述，下列何者正確？", "A": "按壓肚臍與右側腹股溝連線的下 2 / 3 處，會有按壓痛，甚至反彈痛", "B": "psoas sign 是指將右大腿內翻會導致腹部的疼痛感增加", "C": "Rovsing sign 是指按壓左下腹會導致右下腹疼痛", "D": "腹部肌肉僵硬 ( muscle guarding ) 表示病人過度緊張，暫不需手術治療", "year": 113, "ans": "C", "id": "113-67"}, {"num": 68, "q": "60歲病人慢性腹脹與腹痛已2個月，有血便情形，體重減輕5kg，下列何者正確？", "A": "胃癌為第一優先考慮的鑑別診斷，大腸癌次之", "B": "腹部電腦斷層與內視鏡皆有必要安排", "C": "若出現裡急後重症狀時應優先考慮為胃癌", "D": "當懷疑胃腸道癌症時應優先考慮檢測 AFP ( alpha - fetal protein )", "year": 113, "ans": "B", "id": "113-68"}, {"num": 69, "q": "有關機械性腸阻塞(mechanical ileus)的病徵，下列何者正確？ ①可聽到高頻(high-pitched)且高活動性(hyperactive)腸音 ②為腹部手術後之常見現象 ③敗血症為罕見的併發症 ④若有明顯腹膜炎，表示可能為絞扼性(strangulation)腸阻塞", "A": "①②", "B": "③④", "C": "①④", "D": "②③", "year": 113, "ans": "C", "id": "113-69"}, {"num": 70, "q": "有關陰囊腫塊，下列何者正確？ ①在光線照射之下，若會透光則可能為陰囊水腫 ②疝氣所造成之腫塊會出現在腹股溝，不會在陰囊內 ③副睪丸炎非陰囊腫塊之原因，但會引起陰囊疼痛 ④通常是良性病灶", "A": "①④", "B": "②③", "C": "①③", "D": "②④", "year": 113, "ans": "A", "id": "113-70"}, {"num": 71, "q": "70歲病人因呼吸喘與雙下肢水腫就醫，心臟超音波顯示重度二尖瓣閉鎖不全與左心室射出 分率35%，下列敘述何者正確？ ①心臟聽診可在心尖處聽到舒張期心雜音 ②呼吸音聽診可聽到雙側基底部爆裂音(crackles) ③若出現多量黏稠痰液表示已出現明顯肺水腫 ④若出現心房纖維顫動，會使心輸出量降低", "A": "①④", "B": "②③", "C": "②④", "D": "①③", "year": 113, "ans": "C", "id": "113-71"}, {"num": 72, "q": "有關膿胸(empyema)之敘述，下列何者錯誤？", "A": "大部份是因肺炎感染所引起", "B": "呼吸音減弱", "C": "叩診有濁音", "D": "觸覺震顫增加", "year": 113, "ans": "D", "id": "113-72"}, {"num": 73, "q": "45歲女性左側乳房有輕微疼痛就診，提到最近工作壓力很大，擔心這可能與乳腺癌有關。 下列何者表徵最需要特別注意？", "A": "近期出現乳頭凹陷", "B": "乳暈顏色變深", "C": "乳房大小不對稱", "D": "乳房皮膚有細小顆粒狀改變", "year": 113, "ans": "A", "id": "113-73"}, {"num": 74, "q": "下列哪一種疾病，最不會出現右側肋脊角(costovertebral angle)部位敲擊痛？", "A": "腎臟血管肌脂肪瘤破裂", "B": "急性腎盂性腎炎", "C": "腰大肌膿瘍", "D": "肝膿瘍", "year": 113, "ans": "D", "id": "113-74"}, {"num": 75, "q": "承上題，為了進一步鑑別上述的臆斷，需要尋找其他的身體診察發現，下列哪一項徵候 最沒有幫助？", "A": "病人出現發燒", "B": "鞏膜沒有黃疸", "C": "腰側出現透納氏徵候", "D": "腰大肌徵候陽性", "year": 113, "ans": "B", "id": "113-75"}, {"num": 76, "q": "某專科護理師將5份病歷資料提供給生技公司，共獲取1萬元報酬。下列敘述何者錯誤？", "A": "違反個人資料保護法，處 5 年以下有期徒刑", "B": "當地衛生局得依護理人員法處以停業 1 年", "C": "需對所有病人負民事損害賠償，無刑事責任", "D": "損害賠償以每人每一事件 2 萬元以下計算", "year": 113, "ans": "C", "id": "113-76"}, {"num": 77, "q": "依據目前「專科護理師於醫師監督下執行醫療業務辦法」第七條中「預立醫療流程」之 訂定內容，應包括下列何項？", "A": "訓練醫院之監督方式", "B": "疾病之流行病學趨勢", "C": "症狀、病史及身體評估等情境或診斷", "D": "監督醫師應具備之特定訓練標準", "year": 113, "ans": "C", "id": "113-77"}, {"num": 78, "q": "有關專科護理師及訓練專師執行涉及侵入性人體醫療之業務範圍項目中，下列敘述何者 正確？", "A": "肌肉及肌腱之傷口縫合", "B": "陰道擴張器之置入與電燒治療", "C": "氣管內管及中央靜脈導管置入", "D": "心導管檢查後 sheath 拔除", "year": 113, "ans": "D", "id": "113-78"}, {"num": 79, "q": "48歲男性上班途中車禍送醫，左側下肢有大面積鈍挫傷及撕裂傷，並表示頭痛想吐，下列 處置何者不在「專科護理師於醫師監督下執行醫療業務辦法」中所規範可以執行的業務 範圍？", "A": "執行詳細病史詢問及身體評估後，撰寫醫療紀錄", "B": "開立該機構核定通過的預立醫療流程中包含之檢驗、檢查表單", "C": "檢驗、檢查之結果初步判讀後與病人進行說明", "D": "給予傷口照護指導，並開立診斷書讓病人請假休養", "year": 113, "ans": "D", "id": "113-79"}, {"num": 80, "q": "承上題，病人左耳處有2×6公分之撕裂傷，左手肘腫脹疼痛，左側呼吸音減弱、心臟無 雜音，腹部柔軟無壓痛，生命徵象穩定，依據「專科護理師於醫師監督下執行醫療業務 辦法」中，下列何者錯誤？", "A": "執行左耳處 2 × 6 公分撕裂傷之表皮縫合與傷口換藥", "B": "懷疑左側創傷性氣胸，置入肋膜腔 pig - tail 導管引流", "C": "懷疑左側鷹嘴突骨折，開立會診單照會骨科醫師", "D": "衛教病人腦部有延遲性蜘蛛膜下腔出血的可能性", "year": 113, "ans": "B", "id": "113-80"}, {"num": 1, "q": "對於專科護理師職責之敘述，下列何者錯誤？", "A": "協調擬定內外科病人住院相關檢查與治療計畫", "B": "協助安寧緩和病人的家屬面對失落與哀傷歷程", "C": "開立安養機構病人的治療計畫與用藥醫囑", "D": "提供個人、家庭或團體在社區心理衛生照護", "year": 114, "ans": "C", "id": "114-1"}, {"num": 2, "q": "依據衛生福利部對「專科護理師」的角色定位，下列何者最適當？", "A": "接受完整訓練後，可獨立執行醫療業務", "B": "與醫師共同提供連續性護理與醫療照護", "C": "實質工作內容主要在取代住院醫師角色", "D": "核心目標是成為醫療輔助性專業人力", "year": 114, "ans": "B", "id": "114-2"}, {"num": 3, "q": "目前處於資訊科技主導之際，護理專業對「聰明工作」的描述，下列何者錯誤？", "A": "所有措施皆具理論或實證依據", "B": "追求高品質且省時之護理成效", "C": "包含護理行政與技術層面創新", "D": "以人工智慧作為照顧決策核心", "year": 114, "ans": "D", "id": "114-3"}, {"num": 4, "q": "下列何者較不屬於臨床照護實證護理知識之應用？", "A": "臨床照護指引 ( clinical practice guidelines , CPG )", "B": "醫病共享決策 ( shared decision - making , SDM )", "C": "臨床路徑 ( clinical pathway )", "D": "護理資訊系統 ( nursing information system , NIS )", "year": 114, "ans": "D", "id": "114-4"}, {"num": 5, "q": "專科護理師執行溝通協調之原則，下列敘述何者最不適當？", "A": "有效的溝通可促進跨專業團隊間訊息的傳達與共享", "B": "運用安撫技巧雖能減輕衝突情緒，但難以解決根本問題", "C": "面對不想解決的警覺性衝突，擴大衝突點是必要方式", "D": "協力合作 ( collaboration ) 是一種正向的合作途徑", "year": 114, "ans": "C", "id": "114-5"}, {"num": 6, "q": "有關「善用沉默」的治療性溝通技巧，下列敘述何者最不適當？", "A": "沉默時雖沒有語言內容，卻有非語言訊息在進行", "B": "不想說話時可以沉默溝通方式來進行", "C": "可應用於試圖重整溝通對象的想法時", "D": "可安靜、關心地陪伴在病人身旁", "year": 114, "ans": "B", "id": "114-6"}, {"num": 7, "q": "對84歲肺癌第三期病人與家屬進行預立醫療指示(advance care planning,ACP)諮詢，下列 執行過程何者較不適當？", "A": "除病人外，需有三親等內親屬 ( 至少1人 ) 參加", "B": "協助病人與家屬釐清資訊不清、焦慮與治療抉擇困難", "C": "與病人討論感受與目標，提供緩和醫療資源資訊", "D": "ACP 的立法目的是為了尊重病人醫療自主意願", "year": 114, "ans": "A", "id": "114-7"}, {"num": 8, "q": "專科護理師對中風後病人進行出院準備服務諮商，下列何者較不適當？", "A": "應事先評估病人與家屬對疾病歷程了解程度", "B": "需考慮病人特殊文化背景、對需求的表達方式", "C": "應直接轉介腦中風個案管理師接手後續規劃", "D": "需觀察病人與家屬所表現之非語言行為背後意涵", "year": 114, "ans": "C", "id": "114-8"}, {"num": 9, "q": "某社區活動中心邀請專科護理師至社區進行高血壓健康教育講座，下列何者為設計課程的 第一步？", "A": "與活動中心負責人確認講座的學習成效評量指標", "B": "分析居民基本資料、文化背景及健康識能程度", "C": "安排教學環境、準備教材，並設計講座舉辦方式", "D": "與心血管專科醫師討論高血壓的最新治療指引", "year": 114, "ans": "B", "id": "114-9"}, {"num": 10, "q": "有關問題導向學習(problem based learning,PBL)的說明及應用，下列何者較不適當？", "A": "由教師主導學習流程，帶領學習者解決真實情境的問題", "B": "學習者透過團隊互動及腦力激盪，確認學習主題與目標", "C": "學習者獲得的知識較為片段，學習動機為成敗的重要關鍵", "D": "需耗費大量的教學資源與師資人力，具有執行的挑戰性", "year": 114, "ans": "A", "id": "114-10"}, {"num": 11, "q": "下列何者屬於學習者認知領域的「應用」層級教學目標？", "A": "能舉例說明胰島素於人體的功能", "B": "能依據血糖數值，正確計算應施打的胰島素劑量", "C": "可辨別3項胰島素休克與高血糖昏迷的徵象", "D": "能說出自己目前使用兩種胰島素的不同之處", "year": 114, "ans": "B", "id": "114-11"}, {"num": 12, "q": "專科護理師設計 3 個月「過重成人改變錯誤飲食行為」的介入團體，目標為改變學習者的 飲食行為。下列何者最適合做為第一個月參與者行為改變的評量指標？", "A": "體脂肪降低 2 %", "B": "低密度脂蛋白降低 5 %", "C": "完成 20 天每日飲食紀錄", "D": "每日步行步數達 7000 步", "year": 114, "ans": "C", "id": "114-12"}, {"num": 13, "q": "下列何者最能展現專科護理師角色的獨立性專業價值？", "A": "依據醫師的指示完成交辦任務", "B": "舉辦健康講座提高病人滿意度", "C": "協助疾病診斷並提出個人意見", "D": "以實證為基礎提供照護與決策", "year": 114, "ans": "D", "id": "114-13"}, {"num": 14, "q": "高齡臥床病人有多處嚴重壓力性損傷，此次因肺炎入院做進一步處理，下列何者最能促進 醫療團隊共識及完成整體照顧計畫？", "A": "安排召開多科團隊個案討論會議", "B": "將訊息電話告知醫師後等待評估結果", "C": "先完成外科手術再通知其他科部", "D": "完成相關病歷紀錄並開立照會單", "year": 114, "ans": "A", "id": "114-14"}, {"num": 15, "q": "當專科護理師與主治醫師在病人處置意見上有分歧，下列何者溝通方式最符合正向、尊重 與雙向溝通的原則？", "A": "以醫師決策為標準以免衝突", "B": "面對面討論並尋求照顧共識", "C": "在病歷上紀錄表達不同意見", "D": "請該科部主任出面主持公道", "year": 114, "ans": "B", "id": "114-15"}, {"num": 16, "q": "當與患有失智症的病人進行溝通時，下列何者最不適當？", "A": "保持耐心與同理心，避免催促病人", "B": "使用圖片、手勢來輔助溝通，協助病人理解", "C": "支持病人說出想法與困難，並給予鼓勵", "D": "當病人表達錯誤時，須及時給予指正", "year": 114, "ans": "D", "id": "114-16"}, {"num": 17, "q": "到職剛滿3個月的護理師，擬進行一位長期臥床且意識不清女性病人之尿液培養採檢， 陪病家屬強烈表示希望由專科護理師來執行採檢。您是該病房的專科護理師，下列處理 方式何者較適當？", "A": "陪同護理師進行尿液培養採檢並給予協助，保持無菌技術", "B": "告知護理師尿液採檢是護理師的工作職責之一，讓護理師執行", "C": "為安撫家屬情緒由專科護理師進行尿液採檢，好讓家屬安心", "D": "請住院醫師告知家屬說明須於期限內採集檢體，以免延誤治療", "year": 114, "ans": "A", "id": "114-17"}, {"num": 18, "q": "下列何者是臨床指引之評析工具？", "A": "Cochrane Rob 2.0", "B": "Oxford systematic reviews - critical appraisal sheet", "C": "AGREE Ⅱ", "D": "JBI checklist for quasi - experimental studies", "year": 114, "ans": "C", "id": "114-18"}, {"num": 19, "q": "25歲病人術後第 2 天，傍晚開始持續腹痛，專科護理師評估後懷疑有腸阻塞現象，建議值班 住院醫師開立腹部X光檢查與禁食。但住院醫師表示：「不急，先試著進食看看再說。」 專科護理師擔心延誤處理可能影響病人安全，請問此時最符合專業倫理與團隊合作原則 的應對為何？", "A": "立即代替醫師開立腹部 X 光檢查與禁食醫囑，避免延誤", "B": "應尊重醫師判斷，雖不同意也不應過度干預", "C": "基於臨床經驗，向病人說明應禁食並先暫停飲食", "D": "與醫師詳細討論病況並提出建議，必要時通報主治醫師", "year": 114, "ans": "D", "id": "114-19"}, {"num": 20, "q": "病人突發意識喪失與呼吸停止，現場僅有專科護理師與病房護理師，當下聯繫主治醫師 無法即時趕到，團隊啟動緊急應變機制。專科護理師立即實施心肺復甦術，並協助正壓 面罩給氣(bag-valve-mask ventilation)、給予高濃度氧氣。下列何者最符合現行法規規範？", "A": "得於緊急時依預立醫療授權執行基本急救措施，並於事後向醫師報告", "B": "可於緊急情況下依臨床判斷逕行執行所有必要處置，不須向醫師報告", "C": "不得執行任何急救相關動作，應等待醫師到場處理", "D": "可因緊急狀況，執行插管或藥物注射等侵入性處置", "year": 114, "ans": "A", "id": "114-20"}, {"num": 21, "q": "照護失智症病人時，下列何者不是友善溝通與維護尊嚴的表現？", "A": "面帶微笑自我介紹", "B": "避免眼神直接注視", "C": "避免糾正不合時宜的話語", "D": "耐心傾聽並放慢速度回覆", "year": 114, "ans": "B", "id": "114-21"}, {"num": 22, "q": "病人於1PM術後返回病房，專科護理師依指示開立Primperan® 10mg/2mL IV push stat， 預防術後腸胃不適。5PM專科護理師瀏覽病歷，發現護理師尚未依醫囑完成該藥物注射。 依護理倫理規範，專科護理師下列做法何者最適當？", "A": "提醒護理師，請其立即依醫囑完成藥物注射", "B": "將藥物自醫囑中刪除", "C": "告知護理師其疏失，並主動通報給藥異常事件", "D": "修改藥物開立時間，請護理師立即完成給藥", "year": 114, "ans": "C", "id": "114-22"}, {"num": 23, "q": "衛生福利部規劃的「護理輔佐人力制度」中，對於「照護輔佐 (nurse aide)」與「護理 助理(nursing associate)」這兩種人員的職能角色與工作內容之敘述，下列何者錯誤？", "A": "「照護輔佐」的職能角色定位為生活照護導向，主要提供住院病人身體清潔、進食等", "B": "「照護輔佐」的工作內容涵蓋協助管灌食與體溫量測，但這些項目需經醫院教育訓練", "C": "「護理助理」的職能角色定位為護理輔助導向，可與護理師合作執行輔助護理業務", "D": "「護理助理」在護理師指導下，可執行簡單傷口換藥等侵入性與風險較高之照護技術", "year": 114, "ans": "D", "id": "114-23"}, {"num": 24, "q": "王護理師已領有護理師證書並從事臨床護理工作3年。她計畫開設「居家護理所」，並 希望自己能擔任該機構的負責資深護理人員。也考慮在未來進修成為專科護理師，以擴大 服務範圍。依現行法規，下列何者最為正確？", "A": "目前王護理師已領有護理師證書並完成執業登記，即可擔任居家護理所的負責資深", "B": "王護理師若要取得專科護理師證書，必須先完成專科護理師訓練，並經中央主管機關", "C": "居家護理所設立後，若其負責資深護理人員因故不能執行業務超過 1 個月，需內部", "D": "服務對象有醫療需求，該所專科護理師在監督醫師未親自在場的情況下，可直接執行", "year": 114, "ans": "B", "id": "114-24"}, {"num": 25, "q": "急救責任醫院(A醫院)目前因設備維護，無法提供嚴重外傷病人之必要處置，A醫院的 後送醫院(B醫院)能提供該項服務。依據民國102年「緊急醫療救護法」及「緊急傷病 患轉診實施辦法」規定，下列何者最適當？", "A": "A 醫院應立即將病人轉診至 B 醫院，無需事先告知病人家屬轉診原因或取得其書面", "B": "A 醫院應先對病人進行必要之穩定處置，說明原因並取得書面轉診同意，聯繫 B 醫院", "C": "A 醫院因設備故障及人力不足，可以直接拒絕收治該病人，並要求救護車將病人直接", "D": "A 醫院可直接將病人轉診至 B 醫院，但 B 醫院有權視自身病人負荷量或人力狀況，", "year": 114, "ans": "B", "id": "114-25"}, {"num": 26, "q": "王小華護理師於114年8月10日在台中醫學中心完成專科護理師訓練，並獲得醫院核發 完訓證明。未取得執照前，因故欲南下至具專科護理師訓練醫院資格的高雄醫院擔任 專科護理師，下列敘述何者正確？", "A": "高雄醫院可安排其接受專科護理師補充訓練", "B": "其可於高雄醫院執行「專科護理師於醫師監督下執行醫療業務辦法」之醫療業務", "C": "台中醫學中心可視其狀況，安排每週 1 日補充訓練至 115 年 6 月 30 日", "D": "其可報名參加 114 年 8 月 30 日舉辦之專科護理師甄審考試", "year": 114, "ans": "C", "id": "114-26"}, {"num": 27, "q": "依據民國112年修訂「專科護理師分科及甄審辦法」，下列敘述何者正確？", "A": "證書效期屆期未更新，即喪失專科護理師資格，需重新接受訓練並通過甄審，始得", "B": "如有特殊原因，無法在證書效期屆滿前完成 6 年 120 點繼續教育積分，可向地方衛生", "C": "經核准證書延期更新者，應自效期屆至日起 6 個月內檢具 6 年 120 點繼續教育積分申請", "D": "於中央主管機關認定之醫療資源不足地區執業或因公派駐國外從事外交有關國際醫療", "year": 114, "ans": "D", "id": "114-27"}, {"num": 28, "q": "病人家屬在病房情緒失控並推倒工作中之專科護理師，雖然專科護理師表示體諒家屬情緒 不希望追究，此時醫療機構採取何種處置最適當？", "A": "應將加害人姓名、特徵公布大廳明顯處，以防止其他人被傷害", "B": "應邀集倫理小組會議，徵詢當事人意願後再決定是否通報", "C": "應尊重該醫護人員不提告之意願，決定不通報", "D": "應立即通報警察機關，並啟動保護與關懷機制", "year": 114, "ans": "D", "id": "114-28"}, {"num": 29, "q": "有關專科護理師執業規範之敘述，下列何者錯誤？", "A": "執業範圍包括：健康問題之護理評估、預防保健之護理措施、護理指導及諮詢、醫療", "B": "113 年新增家庭科專科護理師，係為拓展在社區以人口群為基礎之健康照護角色功能，", "C": "取得美國專科護理師證書並在美國實際執業多年，返國後仍需重新考取我國專科護理師", "D": "進階藥理、病理及生理為基礎之分析判斷、臨床推理及醫療照護之能力是專科護理師", "year": 114, "ans": "B", "id": "114-29"}, {"num": 30, "q": "證據品質評估以GRADE系統評核隨機對照研究，下列何者不是降級因素？", "A": "偏差風險", "B": "不一致性", "C": "結果不顯著", "D": "出版偏差", "year": 114, "ans": "C", "id": "114-30"}, {"num": 31, "q": "末期病人表達疼痛與不適時，下列何者最能展現專科護理師之臨床倫理與專業角色？", "A": "面對病人疼痛主訴時，可建議儘量忍耐以避免過度使用藥物而產生依賴", "B": "主動對病人表示安慰，並建議使用坊間草藥與輔助療法作為止痛選項之一", "C": "協助病人與家屬了解病情與安寧療護選項，並依醫療團隊討論擬定止痛計畫", "D": "為了立即減輕病人痛苦，可先調整鎮痛藥劑量，再跟醫師報備", "year": 114, "ans": "C", "id": "114-31"}, {"num": 32, "q": "有關專科護理師於長期照顧體系中的角色，下列敘述何者較不適當？", "A": "參與出院準備服務，協助病人銜接社區照護資源", "B": "評估高齡與失能個案之身心功能，擬定照護計畫", "C": "於社區據點提供衛教、健康促進與慢性病追蹤服務", "D": "只能擔任行政管理職務，但不提供直接照護", "year": 114, "ans": "D", "id": "114-32"}, {"num": 33, "q": "根據 2025 年美國糖尿病學會照護指引，下列何者最不符合該指引對糖尿病病人之整體 飲食建議？", "A": "不鼓勵以市售營養飲料來維持主要的能量與營養", "B": "鼓勵以動物性優質蛋白來取代植物性蛋白質，如豆腐、黃豆等", "C": "建議病人以代糖飲品如無糖可樂取代含糖飲料以降低碳水攝取", "D": "強調均衡飲食與代謝目標並重，避免採用特殊飲食，如生酮飲食", "year": 114, "ans": "B", "id": "114-33"}, {"num": 34, "q": "李小姐BMI為29kg/m²，想減重但常因工作忙碌無法持續運動。她表示：「我已經下載 健身App，每天早上做個15分鐘，但週末常懶得動」。依據跨理論模式(transtheoretical model,TTM)，下列哪一階段最符合她目前的狀態？", "A": "前預備期 ( precontemplation stage )", "B": "預備期 ( contemplation stage )", "C": "行動期 ( action stage )", "D": "維持期 ( maintenance stage )", "year": 114, "ans": "C", "id": "114-34"}, {"num": 35, "q": "專科護理師想用實證手法回答「新生兒注射維生素K1，是否會增加兒童期罹患白血病的 風險」，在實證問題的提問類型中是屬於下列何種？", "A": "介入型 ( intervention )", "B": "病因型 ( etiology )", "C": "診斷型 ( diagnosis )", "D": "預後型 ( prediction / prognosis )", "year": 114, "ans": "B", "id": "114-35"}, {"num": 36, "q": "專科護理師想探討苦瓜製劑/萃取物能否降低第二型糖尿病成人之血糖，有關此臨床問題 形成的P：population、I：intervention、C：comparison、O：outcome之敘述，下列何者錯誤？", "A": "P：第二型糖尿病成人", "B": "I ：苦瓜製劑 / 萃取物", "C": "C：口服降血糖藥物", "D": "O：飯後血糖值、糖化血色素", "year": 114, "ans": "C", "id": "114-36"}, {"num": 37, "q": "有關臨床照護指引發展準則的敘述，下列何者錯誤？", "A": "指引發展成員的組成不建議納入病人與家屬，避免影響指引發展的客觀性", "B": "指定指引和指引發展經費來源必須詳細說明，並向大眾公開", "C": "指引發展成員應使用系統性文獻回顧的標準格式及評價", "D": "建議內容應以標準化格式呈現，詳細說明建議的措施是什麼，以及在什麼情況下執行", "year": 114, "ans": "A", "id": "114-37"}, {"num": 38, "q": "Irvine 等學者於 1998 年提出「護理角色有效模式概念架構」，分為結構面、過程面、 結果面，下列何者不屬於「結果面」的指標？", "A": "中心靜脈導管相關血流感染率", "B": "非計畫性氣管內管滑脫發生率", "C": "護理人員離職率", "D": "一般病房住院跌倒發生率", "year": 114, "ans": "C", "id": "114-38"}, {"num": 39, "q": "某內科病房住院病人一般壓力性損傷發生率超過閾值，單位品質改善小組要監測「住院 病人預防壓力性損傷照護執行完整率」過程的資料來源應包括： ①皮膚觀察 ②訪談病人家屬 ③護理紀錄 ④病人滿意度 ⑤異常事件報告", "A": "①②⑤", "B": "①③④", "C": "①③⑤", "D": "②④⑤", "year": 114, "ans": "C", "id": "114-39"}, {"num": 40, "q": "臨床護理品質關鍵性指標包括顧客、內部流程、學習成長及財務四大構面，下列何者 不屬於內部流程指標？", "A": "臨床警示之反應", "B": "意外事件導致傷害事件", "C": "血流管路照護", "D": "呼吸道照護", "year": 114, "ans": "B", "id": "114-40"}, {"num": 41, "q": "管制圖係由修華特(Shewhart)所發明，其利用統計方法將所蒐集的資料算出管制界限， 以管制及判斷是否有變異發生。管制界限通常為平均值加減(＋/－)幾個標準差？", "A": "1 個", "B": "2 個", "C": "3 個", "D": "4 個", "year": 114, "ans": "C", "id": "114-41"}, {"num": 42, "q": "判斷臨床護理品質管理指標四大準則，分別為高危險活動(high risk activities)、高等量 活動(high volume activities)、高成本活動(high cost activities)及具有問題傾向的活動 (problem prone activities)，下列各項護理活動所對應的準則，何者正確？", "A": "護理人員執行化學治療 - 高危險活動", "B": "輸血 - 高等量活動", "C": "靜脈注射給藥 - 高成本活動", "D": "病人皮膚照護 - 具有問題傾向的活動", "year": 114, "ans": "A", "id": "114-42"}, {"num": 43, "q": "醫院參與各項指標計畫，為增加指標管控效率而設定品質合格標準，下列何者不是實務 操作上用來判定指標異常的數值？", "A": "閾值", "B": "平均值", "C": "管制圖", "D": "外部同儕值", "year": 114, "ans": "B", "id": "114-43"}, {"num": 44, "q": "2024年成立的「健康台灣推動委員會」，旨在打造台灣成為健康幸福的國家，所提出的 建言不包含下列何者？", "A": "改善醫療人員工作環境", "B": "長照 3.0", "C": "多元財務管道，控制健保總額", "D": "倡議 - 健康台灣深耕計畫", "year": 114, "ans": "C", "id": "114-44"}, {"num": 45, "q": "有關「三高防治888計畫」之內容，不包含下列何者？", "A": "全國80 % 成年人接受個人生活習慣諮詢，提升自我管理能力", "B": "目標是達成 2030 年降低三高相關慢性病標準化死亡率 1 / 3", "C": "若為三高之高風險者，納入「代謝症候群防治計畫」", "D": "若為三高的病友，納入慢性病相關照護網", "year": 114, "ans": "A", "id": "114-45"}, {"num": 46, "q": "2024年國家希望工程「健康台灣」政策中，強化國家癌症防治計畫的目標，為2030年癌症 標準化死亡率可以降低多少？", "A": "1 / 2", "B": "1 / 3", "C": "1 / 4", "D": "1 / 5", "year": 114, "ans": "B", "id": "114-46"}, {"num": 47, "q": "85歲女性病人主訴在家跌倒後，右手肘及肩關節疼痛不已，經專科護理師初步評估後發現 疑似右肩關節脫位，下列處置何者較不適當？", "A": "穩定生命徵象後安排相關檢查", "B": "依醫囑施以徒手復位", "C": "評估有無神經及血管受損情形", "D": "固定患肢並限制肢體活動", "year": 114, "ans": "B", "id": "114-47"}, {"num": 48, "q": "有關病毒性肝炎之敘述，下列何者較不適當？", "A": "目前只有 B 型肝炎可以施打疫苗預防", "B": "慢性 B 型肝炎帶原者為感染 D 型肝炎之高危險群", "C": "不安全的性行為，有機會感染 A 型肝炎", "D": "感染 C 型肝炎後發生肝硬化的機會較高", "year": 114, "ans": "A", "id": "114-48"}, {"num": 49, "q": "25歲男性，因車禍導致頭部外傷併顱內出血住進加護病房，第 4 天從鼻胃管流出咖啡色 的血，內視鏡檢查發現胃大彎處有多處潰瘍，最可能為下列何者？", "A": "Cushing ulcer", "B": "Curling ' s ulcer", "C": "Cullen ' s ulcer", "D": "Murphy ' s ulcer", "year": 114, "ans": "A", "id": "114-49"}, {"num": 50, "q": "病人腸蠕動有高亢金屬音(metallic sounds)，下列何者為最可能之原因？", "A": "急性腸胃炎", "B": "機械性 ( mechanical ) 腸阻塞", "C": "腸破裂 ( perforation )", "D": "麻痺性 ( paralytic ) 腸阻塞", "year": 114, "ans": "B", "id": "114-50"}, {"num": 51, "q": "70歲長期臥床病人，突然劇烈上腹疼痛，懷疑消化性潰瘍造成穿孔，如果病人無法配合 站立照相，下列哪一種X光檢查最有機會看出游離空氣(free air)？", "A": "平躺 ( supine ) 胸部 AP view", "B": "左側躺 ( left decubitus ) KUB", "C": "右側躺 ( right decubitus ) KUB", "D": "一般 KUB", "year": 114, "ans": "B", "id": "114-51"}, {"num": 52, "q": "下列何者不是心臟衰竭病人常見的徵象與症狀？", "A": "疲勞、食慾不振", "B": "夜間頻尿", "C": "心包填塞", "D": "肝腫大、腹水", "year": 114, "ans": "C", "id": "114-52"}, {"num": 53, "q": "病人順利氣管內插管後，血壓由180/110mmHg降為80/50mmHg，造成此病人血壓降低 的原因，下列何者最不可能？", "A": "張力性氣胸", "B": "鎮靜藥物", "C": "其他內科疾病", "D": "顱內壓升高", "year": 114, "ans": "D", "id": "114-53"}, {"num": 54, "q": "60歲男性到院前心臟停止 (OHCA)，心電圖有看到波形，但脈搏摸不到，重點式心臟 超音波發現病人右心室明顯擴大，下列何者為最可能的診斷？", "A": "心包膜填塞 ( cardiac tamponade )", "B": "張力性氣胸 ( tension pneumothorax )", "C": "主動脈剝離 ( aortic dissection )", "D": "肺動脈栓塞 ( pulmonary embolism )", "year": 114, "ans": "D", "id": "114-54"}, {"num": 55, "q": "有關急性闌尾炎之敘述，下列何者正確？", "A": "食慾不振 ( anorexia ) 的問題不常發生", "B": "不到 50 % 的病人按壓右下腹會出現壓痛", "C": "最痛按壓點位於麥克伯尼點 ( McBurney point ) 或附近", "D": "腰大肌徵象 ( psoas sign ) 是身體檢查中敏感度最高的項目", "year": 114, "ans": "C", "id": "114-55"}, {"num": 56, "q": "24歲女性因高燒兩天就醫，身體診察顯示血壓85/50mmHg，皮膚有彌漫性紅斑性皮疹， 實驗室數據顯示白血球上升與肝腎功能異常。主訴月經第 3 天，有使用衛生棉條，目前有 頭暈、肌肉痠痛等症狀。下列何者為此病人最可能之診斷？", "A": "急性腎盂腎炎 ( acute pyelonephritis )", "B": "毒性休克症候群 ( toxic shock syndrome )", "C": "骨盆腔發炎性疾病 ( pelvic inflammatory disease )", "D": "萊姆病 ( Lyme disease )", "year": 114, "ans": "B", "id": "114-56"}, {"num": 57, "q": "15歲男性在體育課後突然出現左側陰囊劇痛，合併噁心與嘔吐。身體診察顯示左側睪丸 位置較高、觸痛明顯，提睪反射(cremasteric reflex)消失。下列何者為此病人最可能之診斷？", "A": "副睪炎 ( epididymitis )", "B": "腹股溝疝氣 ( inguinal hernia )", "C": "輸尿管結石 ( ureteral calculus )", "D": "睪丸扭轉 ( testicular torsion )", "year": 114, "ans": "D", "id": "114-57"}, {"num": 58, "q": "22歲男性，主訴從3天前開始排尿會有灼熱疼痛且出現分泌物，身體診察發現尿道口有 黃綠色膿性分泌物流出，病人無發燒、發冷或其他感染之症狀，但擔心與 1 週前未做防護 之性行為有關。下列何者為最可能之病原體？", "A": "披衣菌 ( Chlamydia trachomatis )", "B": "淋病雙球菌 ( Neisseria gonorrhoeae )", "C": "陰道滴蟲 ( Trichomonas vaginalis )", "D": "梅毒螺旋體 ( Treponema pallidum )", "year": 114, "ans": "B", "id": "114-58"}, {"num": 59, "q": "73歲男性雙耳聽力逐漸減退已5年，在嘈雜環境中難以聽清他人對話。主訴無耳痛、耳漏 或眩暈，無明顯噪音暴露史或耳毒性藥物使用史。雙側鼓膜完整，韋伯測試(Weber's test) 兩側聲音一致，林內測試(Rinne test)雙側空氣傳導時間皆大於骨傳導，雙側對稱性高頻 聽力喪失。下列何者為此病人最可能之診斷？", "A": "耳垢填塞 ( cerumen impaction )", "B": "老年性聽力喪失 ( presbycusis )", "C": "雙側耳硬化症 ( bilateral otosclerosis )", "D": "噪音性聽力喪失 ( noise - induced hearing loss )", "year": 114, "ans": "B", "id": "114-59"}, {"num": 60, "q": "45歲第二型糖尿病病人每日早餐前施打 1次胰島素，糖化血色素值為7.2%，但病人早上 起床後空腹血糖自我監測值常常偏高，醫師懷疑為黎明現象(dawn phenomenon)所導致， 安排連續血糖監測。下列何者最符合黎明現象的血糖變化特徵？", "A": "2 AM血糖 50 mg / dL， 6 AM血糖 220 mg / dL", "B": "2 AM血糖 120 mg / dL， 6 AM血糖 180 mg / dL", "C": "2 AM血糖 200 mg / dL， 6 AM血糖 160 mg / dL", "D": "整夜血糖持續偏高，維持在 180 - 220 mg / dL", "year": 114, "ans": "B", "id": "114-60"}, {"num": 61, "q": "下列何者為泌尿系統急症？ ① 睪丸扭轉 ② 睪丸破裂 ③ 佛尼爾氏壞疽 ( Fournier ' s gangrene ) ④ 箝閉包莖 ⑤ 陰莖異常勃起 ⑥ 隱睪症", "A": "①②③④⑤", "B": "①②③⑤⑥", "C": "①③⑤⑥", "D": "②③④⑤⑥", "year": 114, "ans": "A", "id": "114-61"}, {"num": 62, "q": "70歲男性長期服用藥物治療攝護腺肥大，醫師調整藥物後，抱怨頭暈。下列何者藥物和 頭暈最不相關？", "A": "finasteride ( Proscar® )", "B": "terazosin ( Hytrin® )", "C": "acetaminophen ( Panadol® )", "D": "oxybutynin ( Ditropan® )", "year": 114, "ans": "A", "id": "114-62"}, {"num": 63, "q": "有關突發性胸痛之判斷，下列何者正確？ ①在心尖處有小範圍的刺痛感為心絞痛典型症狀 ②心肌梗塞病人呼吸音可能出現囉音(rales) ③心肌梗塞病人的心電圖可能呈現ST節段下降 ④聽診發現有心雜音表示為瓣膜疾病，可排除心肌梗塞", "A": "①②", "B": "①④", "C": "②③", "D": "③④", "year": 114, "ans": "C", "id": "114-63"}, {"num": 64, "q": "有關心臟衰竭之敘述，下列何者正確？ ①右心衰竭時中心靜脈壓會下降 ②左心衰竭會出現肺水腫 ③左心室射出分率(ejection fraction)未必低於正常範圍 ④肺水腫愈嚴重，痰愈黏稠", "A": "①②", "B": "①④", "C": "②③", "D": "③④", "year": 114, "ans": "C", "id": "114-64"}, {"num": 65, "q": "有關瓣膜疾病之敘述，下列何者正確？ ①僧帽瓣狹窄會出現收縮期心雜音 ②主動脈瓣狹窄所造成的心雜音會在胸骨左上方處最清楚 ③僧帽瓣閉鎖不全所造成的心雜音會在心尖處最為清楚 ④僧帽瓣狹窄可能造成左心房擴大，後續出現心律不整", "A": "①②", "B": "①③", "C": "②④", "D": "③④", "year": 114, "ans": "D", "id": "114-65"}, {"num": 66, "q": "有關周邊血管疾病之敘述，下列何者正確？", "A": "膕動脈急性阻塞可能造成小腿之平滑肌溶解，抽血可發現肌酸磷化酶 ( creatine kinase )", "B": "股靜脈栓塞會使病人出現間歇性跛行", "C": "心房顫動 ( atrial fibrillation ) 為心律的問題，與周邊血管疾病無關", "D": "血管攝影檢查後，穿刺處出現搏動性腫塊，可能是假性動脈瘤 ( pseudoaneurysm )", "year": 114, "ans": "D", "id": "114-66"}, {"num": 67, "q": "有關呼吸音之敘述，下列何者正確？ ①wheezing為上呼吸道阻塞 ②wheezing通常於吐氣時較明顯 ③stridor為下呼吸道阻塞 ④stridor通常於吸氣時較明顯", "A": "①③", "B": "②④", "C": "①②", "D": "③④", "year": 114, "ans": "B", "id": "114-67"}, {"num": 68, "q": "有關大葉性肺炎之敘述，下列何者正確？", "A": "叩診呈濁音，觸覺震顫增加", "B": "叩診呈鼓音，觸覺震顫增加", "C": "叩診呈鼓音，觸覺震顫減少", "D": "叩診呈濁音，觸覺震顫減少", "year": 114, "ans": "A", "id": "114-68"}, {"num": 69, "q": "有關肺癌之敘述，下列何者正確？ ①典型症狀是會出現泡沫痰 ②可能會出現肋膜積水，使得觸覺震顫減少 ③腫瘤標記以CA125為最重要 ④篩檢目的之低劑量電腦斷層(low dose CT scan)不須使用顯影劑", "A": "①③", "B": "②④", "C": "①④", "D": "②③", "year": 114, "ans": "B", "id": "114-69"}, {"num": 70, "q": "有關過度換氣(hyperventilation)之敘述，下列何者正確？ ①病人因太過於緊張，導致呼吸次數過快，使動脈血之二氧化碳分壓上升 ②常於緊張焦慮時發作 ③常會復發，引起呼吸性酸中毒 ④教導使用腹式呼吸，有助症狀之緩解", "A": "①④", "B": "①②", "C": "②④", "D": "①③", "year": 114, "ans": "C", "id": "114-70"}, {"num": 71, "q": "60歲病人發生左腦缺血性中風，下列敘述何者正確？ ①左手左腳肌力下降 ②右眼視力模糊 ③臉部表情不對稱 ④請病人伸出舌頭時，舌頭會向左偏", "A": "①④", "B": "②③", "C": "①②", "D": "③④", "year": 114, "ans": "D", "id": "114-71"}, {"num": 72, "q": "有關坐骨神經痛之敘述，下列何者正確？ ①最常因為第一與第二腰椎椎間盤突出所引起 ②彎腰時症狀會加劇 ③將患肢抬高超過90度引發疼痛為典型症狀 ④可能因梨狀肌(piriformis)壓迫而產生", "A": "①③", "B": "②④", "C": "①④", "D": "②③", "year": 114, "ans": "B", "id": "114-72"}, {"num": 73, "q": "有關脊髓損傷之評估，下列何者正確？ ①乳頭以下皆無感覺表示為第四胸椎之脊髓損傷 ②肚臍以下皆無感覺表示為第十胸椎之脊髓損傷 ③脊髓損傷不會引發呼吸困難 ④雙腿對於疼痛反射有縮腿動作的話，表示肌力為4分", "A": "①②", "B": "①③", "C": "②④", "D": "③④", "year": 114, "ans": "A", "id": "114-73"}, {"num": 74, "q": "有關腕隧道症候群(carpal tunnel syndrome)之敘述，下列何者正確？ ①正中神經(median nerve)受壓迫所導致 ② Phalen test 是指雙手的手掌心互相靠在一起，手掌與前臂呈 90 度，感覺到麻或刺痛則為 陽性 ③患肢拇指外展肌力減弱 ④患側整個手掌都會麻", "A": "①②", "B": "①③", "C": "②④", "D": "③④", "year": 114, "ans": "B", "id": "114-74"}, {"num": 75, "q": "65歲男性在接受冠狀動脈繞道手術後轉入加護病房，術後意識恢復清醒。但於術後第3天， 病人不知自己身在何處，答非所問，激動異常，下列何者最不可能？", "A": "譫妄", "B": "加護病房症候群", "C": "血管性失智症", "D": "電解質失衡", "year": 114, "ans": "C", "id": "114-75"}, {"num": 76, "q": "53歲女性因高血壓而定期接受診療，其於新冠疫情期間因工作量減少而使得收入受到明顯 影響，晚上睡不好。在接受診療時，頭垂得低低的、話不多，有時會突然間哭了起來。 下列鑑別診斷何者最為適宜？", "A": "思覺失調 ( schizophrenia )", "B": "恐慌症 ( panic )", "C": "焦慮症 ( anxiety )", "D": "憂鬱症 ( depression )", "year": 114, "ans": "D", "id": "114-76"}, {"num": 77, "q": "某地區醫院為確保其專科護理師在醫師監督下執行醫療業務時，能符合法規要求並維持 高品質的病人照護，下列何者最能展現其精神？", "A": "醫院可授權資深專科護理師在緊急情況下，自行決定其可之醫療業務範圍，並於事後", "B": "醫院應成立專科護理師執行醫療業務委員會，負責核定專科護理師預立醫療流程內容", "C": "為確保病人安全，所有侵入性醫療業務必須由醫師親自在場監督，專科護理師方能執行", "D": "監督醫師對於專科護理師執行之所有醫療業務，僅需在病人出院前完成紙本或電子", "year": 114, "ans": "B", "id": "114-77"}, {"num": 78, "q": "依據民國113年修訂之「專科護理師於醫師監督下執行醫療業務辦法」中，醫師監督下的 定義與內涵，是確保專科護理師在執行醫療業務時具備法定授權依據與臨床安全保障的 關鍵，下列敘述何者錯誤？", "A": "醫師需事先參與並核定預立醫療流程內容", "B": "醫療機構需定期審查流程內容及執行現況", "C": "急救時各種侵入性處置不受此規範", "D": "所謂醫師之監督不以醫師親自在場為必要", "year": 114, "ans": "C", "id": "114-78"}, {"num": 79, "q": "依據民國113年修訂之「專科護理師於醫師監督下執行醫療業務辦法」規範，下列哪一項 侵入性檢查處置，專科護理師在醫師監督下可以執行？", "A": "執行超音波導引抽吸採集檢體", "B": "操作支氣管鏡檢查採樣及判讀", "C": "執行陰道擴張器置入採集檢體", "D": "操作膀胱鏡以生理食鹽水沖洗", "year": 114, "ans": "C", "id": "114-79"}, {"num": 80, "q": "專科護理師執業登記於居家護理所，其執行「專科護理師於醫師監督下執行醫療業務 辦法」之醫療業務，下列敘述何者正確？", "A": "居家護理所應成立專科護理師執行醫療業務委員會，並由醫師背景的委員擔任召集人", "B": "執行預立醫療流程後，監督醫師不需要到居家護理所，可以傳真方式簽署", "C": "所執行之醫療業務經監督醫師同意後即可執行，不需居家護理所核定", "D": "執登之居家護理所負責人必需為專科護理師，始能針對其所執行業務進行督導", "year": 114, "ans": "B", "id": "114-80"}];

let allQ = [], queue = [], idx = 0;
let correct = 0, wrong = 0, skip = 0;
let answered = new Array(400).fill(false);
let shuffled = false;
let wrongList = [];

function applyFilters() {
  const y = document.getElementById('yearFilter').value;
  allQ = y === 'all' ? [...RAW_DATA] : RAW_DATA.filter(q => String(q.year) === y);
  resetQuiz();
}

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('shuffleLabel').textContent = shuffled ? '✅ 隨機中' : '🔀 隨機排序';
  resetQuiz();
}

function resetQuiz() {
  const y = document.getElementById('yearFilter').value;
  allQ = y === 'all' ? [...RAW_DATA] : RAW_DATA.filter(q => String(q.year) === y);
  queue = shuffled ? shuffle([...allQ]) : [...allQ];
  idx = 0; correct = 0; wrong = 0; skip = 0;
  answered = new Array(queue.length).fill(false);
  wrongList = [];
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('scoreDisplay').textContent = '0 / 0';
  updateProgress();
  renderQuestion();
}

function retryWrong() {
  if (!wrongList.length) { resetQuiz(); return; }
  queue = shuffled ? shuffle([...wrongList]) : [...wrongList];
  idx = 0; correct = 0; wrong = 0; skip = 0;
  answered = new Array(queue.length).fill(false);
  wrongList = [];
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('scoreDisplay').textContent = '0 / 0';
  updateProgress();
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateProgress() {
  const total = queue.length;
  const done = idx;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (!queue.length) {
    area.innerHTML = '<div class="empty">請選擇年份或重新開始 📋</div>';
    return;
  }
  if (idx >= queue.length) {
    showResults(); return;
  }
  const q = queue[idx];
  const letters = ['A','B','C','D'];
  const opts = letters.map(l => ({ l, text: q[l] || '' }));

  area.innerHTML = `
    <div class="q-card" id="qCard">
      <div class="q-meta">
        <span class="badge badge-year">${q.year} 年</span>
        <span class="badge badge-num">第 ${q.num} 題</span>
      </div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="options" id="optionsBox">
        ${opts.map(o => `
          <div class="option" data-letter="${o.l}" onclick="selectOption(this,'${o.l}')">
            <span class="letter">${o.l}</span>
            <span class="text">${escHtml(o.text)}</span>
          </div>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row">
        <button class="btn-prev" onclick="goTo(idx-1)" ${idx===0?'disabled':''}>◀ 上一題</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>下一題 ▶</button>
      </div>
    </div>`;
  updateProgress();
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + (correct + wrong);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function selectOption(el, letter) {
  if (answered[idx]) return;
  answered[idx] = true;

  const q = queue[idx];
  const ans = q.ans; // e.g. "C", "AB", "BCD", "送分"
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));

  const isSpecial = ans === '送分' || ans.length > 1;
  const fb = document.getElementById('feedback');

  if (isSpecial) {
    skip++;
    // highlight all correct options
    const ansLetters = ans === '送分' ? [] : ans.split('');
    if (ansLetters.length > 0) {
      opts.forEach(o => {
        if (ansLetters.includes(o.dataset.letter)) o.classList.add('show-ans');
      });
    }
    el.classList.add('selected');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>⚠️ 本題為送分/複選題</strong>（${q.year}年 第${q.num}題）<br>公告答案：<strong>${ans}</strong>`;
  } else if (letter === ans) {
    correct++;
    el.classList.add('correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✅ 答對了！</strong>（${q.year}年 第${q.num}題）<br>正確答案：<strong>(${ans}) ${escHtml(q[ans])}</strong>`;
  } else {
    wrong++;
    wrongList.push(q);
    el.classList.add('wrong');
    opts.forEach(o => { if (o.dataset.letter === ans) o.classList.add('show-ans'); });
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>❌ 答錯了</strong>（${q.year}年 第${q.num}題）<br>正確答案：<strong>(${ans}) ${escHtml(q[ans])}</strong>`;
  }

  document.getElementById('btnNext').disabled = false;
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + (correct + wrong);
}

function nextQ() {
  if (!answered[idx]) return;
  idx++;
  if (idx >= queue.length) { showResults(); return; }
  renderQuestion();
}

function goTo(i) {
  if (i < 0) return;
  idx = i;
  renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('resultsArea').classList.add('show');
  const total = correct + wrong + skip;
  const pct = total ? Math.round(correct / total * 100) : 0;
  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resultSub').textContent =
    `共作答 ${total} 題（${queue.length} 題中）`;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkip').textContent = skip;
  updateProgress();
}

// init
applyFilters();
</script>
