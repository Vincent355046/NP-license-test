<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP 專科護理通論 ✦ 題庫練習</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --danger: #dc2626;
    --warn: #d97706;
    --bg: #f0f4ff;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(37,99,235,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: #fff;
    padding: 18px 24px 16px;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .03em; }
  header p  { font-size: .78rem; opacity: .82; margin-top: 2px; }
  .header-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .score-pill {
    background: rgba(255,255,255,.22); border-radius: 20px;
    padding: 4px 14px; font-size: .82rem; font-weight: 600;
    white-space: nowrap;
  }

  /* ── Toolbar ── */
  .toolbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .toolbar select, .toolbar button {
    font-size: .82rem; border-radius: 8px; border: 1px solid var(--border);
    padding: 6px 12px; cursor: pointer; background: #fff;
  }
  .toolbar button {
    background: var(--primary); color: #fff; border: none; font-weight: 600;
    transition: background .15s;
  }
  .toolbar button:hover { background: var(--primary-dark); }
  .toolbar button.outline {
    background: #fff; color: var(--primary); border: 1.5px solid var(--primary);
  }
  .toolbar button.outline:hover { background: #eff6ff; }
  .toolbar .spacer { flex: 1; }
  .progress-wrap { display:flex; align-items:center; gap:8px; flex:1; min-width:160px; }
  .progress-bar { flex:1; height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background: var(--primary); border-radius:4px; transition: width .3s; }
  .progress-label { font-size:.78rem; color:var(--muted); white-space:nowrap; }

  /* ── Main layout ── */
  .container {
    max-width: 780px; margin: 0 auto; padding: 24px 16px 80px;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 28px 28px 24px;
    margin-bottom: 20px; animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .q-meta {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .badge {
    font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .badge-year { background: #dbeafe; color: #1d4ed8; }
  .badge-num  { background: #f1f5f9; color: #475569; }
  .badge-cat  { background: #fef9c3; color: #92400e; }
  .q-text {
    font-size: .97rem; line-height: 1.75; color: var(--text);
    margin-bottom: 22px; white-space: pre-wrap; word-break: break-word;
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 16px; border: 2px solid var(--border); border-radius: 10px;
    cursor: pointer; transition: border-color .15s, background .15s, transform .1s;
    font-size: .92rem; line-height: 1.55;
    background: #fff;
  }
  .option:hover:not(.disabled) { border-color: var(--primary); background: #eff6ff; transform: translateX(2px); }
  .option .letter {
    min-width: 28px; height: 28px; border-radius: 50%;
    background: #f1f5f9; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .82rem; flex-shrink: 0;
    transition: background .15s, color .15s;
  }
  .option .text { flex: 1; }

  .option.selected          { border-color: var(--primary); background: #eff6ff; }
  .option.selected .letter  { background: var(--primary); color: #fff; }
  .option.correct           { border-color: var(--success); background: #f0fdf4; }
  .option.correct .letter   { background: var(--success); color: #fff; }
  .option.wrong             { border-color: var(--danger); background: #fef2f2; }
  .option.wrong .letter     { background: var(--danger); color: #fff; }
  .option.show-ans          { border-color: var(--success); background: #f0fdf4; }
  .option.show-ans .letter  { background: var(--success); color: #fff; }
  .option.disabled          { cursor: default; }

  /* ── Feedback ── */
  .feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    font-size: .88rem; line-height: 1.6; display: none;
  }
  .feedback.correct { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .feedback.wrong   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .feedback.show    { display: block; }
  .feedback strong  { font-weight: 700; }

  /* ── Navigation ── */
  .nav-row {
    display: flex; gap: 10px; margin-top: 20px; justify-content: space-between; flex-wrap: wrap;
  }
  .nav-row button {
    padding: 11px 24px; border-radius: 10px; font-size: .9rem; font-weight: 600;
    cursor: pointer; border: none; transition: all .15s;
  }
  .btn-prev { background: #f1f5f9; color: var(--muted); }
  .btn-prev:hover:not(:disabled) { background: #e2e8f0; }
  .btn-next { background: var(--primary); color: #fff; flex: 1; }
  .btn-next:hover { background: var(--primary-dark); }
  .btn-next:disabled { background: #cbd5e1; cursor: default; }
  .btn-prev:disabled { opacity: .4; cursor: default; }

  /* ── Results screen ── */
  .results {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 40px 28px;
    text-align: center; display: none;
  }
  .results.show { display: block; }
  .results .big-score { font-size: 3.5rem; font-weight: 900; color: var(--primary); }
  .results .sub { font-size: 1rem; color: var(--muted); margin: 8px 0 28px; }
  .score-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; margin: 20px 0 32px;
  }
  .score-box { background: #f8fafc; border-radius: 10px; padding: 14px 8px; }
  .score-box .val { font-size: 1.6rem; font-weight: 800; }
  .score-box .lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .score-box.green .val { color: var(--success); }
  .score-box.red   .val { color: var(--danger); }
  .score-box.blue  .val { color: var(--primary); }
  .results button {
    background: var(--primary); color: #fff; border: none;
    padding: 13px 36px; border-radius: 10px; font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .results button:hover { background: var(--primary-dark); }
  .results .retry-outline {
    background: #fff; color: var(--primary); border: 2px solid var(--primary);
    margin-left: 10px;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1rem; }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .q-card { padding: 20px 16px 18px; }
    .score-grid { grid-template-columns: 1fr 1fr; }
    .header-row h1 { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🩺 NP 專科護理通論 題庫</h1>
      <p>110–114年 全真題庫練習</p>
    </div>
    <div class="score-pill" id="scoreDisplay">0 / 0</div>
  </div>
</header>

<div class="toolbar">
  <select id="yearFilter" onchange="applyFilters()">
    <option value="all">全部年份</option>
    <option value="110">110 年</option>
    <option value="111">111 年</option>
    <option value="112">112 年</option>
    <option value="113">113 年</option>
    <option value="114">114 年</option>
  </select>
  <button class="outline" onclick="toggleShuffle()">
    <span id="shuffleLabel">🔀 隨機排序</span>
  </button>
  <button class="outline" onclick="resetQuiz()">↺ 重新開始</button>
  <div class="spacer"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>
</div>

<div class="container">
  <div id="quizArea"></div>
  <div class="results" id="resultsArea">
    <div class="big-score" id="resultPct">0%</div>
    <div class="sub" id="resultSub">練習完成！</div>
    <div class="score-grid">
      <div class="score-box green"><div class="val" id="rCorrect">0</div><div class="lbl">答對</div></div>
      <div class="score-box red"><div class="val" id="rWrong">0</div><div class="lbl">答錯</div></div>
      <div class="score-box blue"><div class="val" id="rSkip">0</div><div class="lbl">送分/複選</div></div>
    </div>
    <button onclick="resetQuiz()">再練一次</button>
    <button class="retry-outline" onclick="retryWrong()">🔁 重練錯題</button>
  </div>
</div>

<script>
const RAW_DATA = [{"num": 1, "q": "有關專科護理師設計有效的病人衛教方案，下列步驟順序何者正確？ ①指出病人的教育需要和病人或家屬的問題 ②給予病人教育問題診斷 ③評估病人的健康照護需求 ④發展教育計畫", "A": "① ② ③ ④", "B": "② ③ ④ ①", "C": "③ ① ② ④", "D": "③ ④ ① ②", "year": 110, "ans": "C", "id": "110-1"}, {"num": 2, "q": "依病人自主權利法，病人就診時，醫療機構或醫師應以其所判斷之適當時機及方式，將 病人之病情、治療方針、處置、用藥、預後情形及可能之不良反應等相關事項告知本 人。下列何者為亦得告知其關係人的要件？", "A": "關係人要求告知", "B": "不會造成病人傷害", "C": "病人未明示反對", "D": "病情已進展至末期", "year": 110, "ans": "C", "id": "110-2"}, {"num": 3, "q": "有關教育方案設計，下列敘述何者錯誤？", "A": "擬訂教學目標，宜包括知識、態度與行為領域", "B": "講述教學策略與敘事性評值是最有效的教學方式", "C": "反饋 ( debriefing ) 是以學生為主模擬情境教案的學習", "D": "安公置性評量", "year": 110, "ans": "B", "id": "110-3"}, {"num": 4, "q": "有關專業人員執行臨床病人教育 下列敘述何者錯誤？", "A": "病人對放射治療照護知識不足，直接指導 ( guidance ) 是最好的衛教方式", "B": "教育病人如何備餐攝取所需營養素是賦能方式，可讓病人承擔自我照護之責", "C": "剛獲知罹患癌症者，立即提供各項治療副作用的自我照顧衛教可降低病人焦慮", "D": "選用的教育方式與材料，需考量病人的教育背景、經驗與視聽覺感官功能", "year": 110, "ans": "C", "id": "110-4"}, {"num": 5, "q": "促進持續品質提升，運用實證健康照護5A的五大步驟，下列順序何者正確？ 僅供 參 考 ①找出最佳證據 ②評估證據，文獻評讀 ③提問 ④應用於臨床解決病人問題 ⑤評估或評值成效與結果", "A": "① ② ③ ④ ⑤", "B": "③ ① ② ④ ⑤", "C": "① ③ ④ ② ⑤", "D": "③ ② ① ④ ⑤", "year": 110, "ans": "B", "id": "110-5"}, {"num": 6, "q": "根據衛生福利部民國106年05月08日專科護理師於醫師監督下執行醫療業務辦法，下列 何者不是專科護理師及訓練專科護理師於醫師監督下得執行之醫療業務？", "A": "代為開立預立特定醫療流程所需表單", "B": "檢驗、檢查之初步綜合判斷", "C": "涉及侵入人體之傷口及管路處置", "D": "擬定醫療方針及相關諮詢", "year": 110, "ans": "D", "id": "110-6"}, {"num": 7, "q": "有關專科護理師想要發展跌倒的臨床照護指引，下列何者不包括在臨床照護指引的發展 重要步驟當中？", "A": "做好利益衝突聲明", "B": "進行系統文獻查證", "C": "有證據等級及強度", "D": "每年要更新一次", "year": 110, "ans": "D", "id": "110-7"}, {"num": 8, "q": "家屬反映：「病人開完刀病都沒好、醫師實在是庸醫，護理人員的照顧也實在很糟糕！」。 專科護理師回應：「你的主治醫師是本院最好的醫師，也是這種手術的權威！而且，護 理人員也都很優秀，有好幾位都曾當選過優良護理師。」前述專科護理師的回應是屬於 何種溝通行為？", "A": "提供資訊 ( informing )", "B": "提出所觀察到的 ( making observation )", "C": "輕視忽略個案的感受 ( belittling feeling that is expressed )", "D": "防衛辯護 ( defending )", "year": 110, "ans": "D", "id": "110-8"}, {"num": 9, "q": "58歲停經婦女，平時規律服用抗高血壓藥，沒有吸菸、沒有嚼食檳榔習慣，一日到醫院 門診就醫取藥時，癌症中心推廣癌症篩檢，可建議該婦女參與國民健康署規劃的哪些癌 症篩檢？", "A": "乳癌、子宮內膜癌與子宮頸癌", "B": "子宮內膜癌、口腔癌與大腸直腸癌", "C": "乳癌、子宮頸癌與大腸直腸癌", "D": "口腔癌、子宮頸癌與大腸直腸癌", "year": 110, "ans": "C", "id": "110-9"}, {"num": 11, "q": "良好溝通影響醫療品質極大 IS AR是增進醫療人員間及醫病間有效溝通的工具，下列 要素敘述何者錯誤？", "A": "S ( self introduction ) ：介紹自己和病人", "B": "B ( bac ground ) ：重要病史、目前用藥及治療情形", "C": "A ( assessment ) ：狀況評估，含 vital signs 數據、各類檢查檢驗結果", "D": "R ( recommendation ) ：後續處理措施或方向", "year": 110, "ans": "A", "id": "110-11"}, {"num": 12, "q": "有關衛福部民國109～110年醫院醫療品質及病人安全工作目標，落實感染管制有關的執 行策略，下列敘述何者錯誤？", "A": "定期環境清潔及監控清潔品質", "B": "執行病人用藥整合與管理", "C": "加強抗生素使用管理機制", "D": "落實工作人員之健康管理", "year": 110, "ans": "B", "id": "110-12"}, {"num": 13, "q": "病人往生後，照護該病人的專科護理師想把病人與子女互動的故事寫成「敘事護理」發 表。依據現行法律，該專科護理師發表病人的故事必須符合下列何項條件？", "A": "人體試驗委員會 ( IRB ) 審查通過", "B": "病人的法定代理人書面同意", "C": "專科護理師作業小組核准", "D": "發表內容無法識別病人", "year": 110, "ans": "B", "id": "110-13"}, {"num": 15, "q": "下列臨床情境，何者不適合採用醫病共享決策(shared decision making,SDM)？", "A": "昏厥之健康年輕女性，心跳 25 次 / 分鐘擬置入心律調節器前", "B": "擔心以後造成家人的負擔，思索是否應該簽署預立醫療決定", "C": "擔心子宮肌瘤術後狀況，考慮應採局部切除還是全子宮切除方式", "D": "肝癌末期病人，希望可以知道各種治療方式優缺點以及疾病預後", "year": 110, "ans": "A", "id": "110-15"}, {"num": 16, "q": "台灣最近數年來，醫療糾紛事件層出不窮，其原因不包括下列何者？", "A": "病人權利意識提高", "B": "病人的期待與現實間的落差", "C": "醫療商業化，民眾將醫療行為視同為商業行為", "D": "醫病關係維持類似父子關係，一切聽從醫師指示行事", "year": 110, "ans": "D", "id": "110-16"}, {"num": 17, "q": "病人抱怨肚子脹氣的問題都不見好轉，而且已經跟醫師和護理師說過好幾次，都沒有被 處理，下列何者為專科護理師最佳的回覆方式？", "A": "「好的，我等一下提醒主治醫師。」", "B": "「怎麼會呢？我們都一直在處理。」", "C": "「我會交班下去，盡快處理。」", "D": "「可以讓我檢查一下你的肚子嗎？」", "year": 110, "ans": "D", "id": "110-17"}, {"num": 18, "q": "根據史克勞德對於持續性品質改善(CQI)的詮釋，下列敘述何者正確？ 公告 試題", "A": "以領導者及顧客為導向", "B": "注重資料，應用科學性方法進行改善", "C": "強調組織高層決策，避免政策方針錯誤", "D": "重視組織內各階層獨立運作", "year": 110, "ans": "B", "id": "110-18"}, {"num": 19, "q": "有關專科護理師的角色功能，下列何者最不恰當？", "A": "問候病人及家屬，建立親善關係", "B": "誠實告訴病人你知識上的侷限", "C": "依據病人的檢查結果決定後續治療", "D": "評值及追蹤病人照護過程及治療結果", "year": 110, "ans": "C", "id": "110-19"}, {"num": 20, "q": "預立醫療決定者，醫療機構或醫師得依其預立醫療決定終止、撤除或不施行維持生命治 療或人工營養及流體餵養，下列臨床條件何者未符合病人自主權利法的規定？", "A": "肺癌末期病人", "B": "永久植物人狀態", "C": "不可逆轉之昏迷狀況", "D": "罕見疾病病童", "year": 110, "ans": "D", "id": "110-20"}, {"num": 21, "q": "55歲病人，為貿易公司高階主管，工作忙碌且壓力大。主訴最近吃完飯後胸口常會有灼 熱的感覺，感覺食道有酸酸的液體往上湧，有時候晚上睡著後會咳嗽醒來，喉嚨疼痛灼 熱。以下建議何者較不適合？", "A": "吃完東西也不要立即躺平，睡前 2 ～ 3 小時儘量不要吃東西，不暴飲暴食", "B": "不菸不酒，減少食用刺激性食物或飲品 ( 例如：咖啡 )", "C": "多攝食高脂、高纖與奶類食品，有效延長胃排空時間", "D": "症狀嚴重且無法調整生活型態得以改善時，可以藥物治療，如制酸劑等", "year": 110, "ans": "C", "id": "110-21"}, {"num": 22, "q": "有關醫護基本倫理四大原則(自主原則、行善原則、不傷害原則與公平正義原則)之敘述， 下列何者正確？", "A": "五倫之中長幼有序乃是公平正義原則", "B": "尊重病人做決定的權利乃是自主原則", "C": "禮義廉恥四維之中「禮」乃是行善原則", "D": "考量病人醫療可負擔性乃是不傷害原則", "year": 110, "ans": "B", "id": "110-22"}, {"num": 23, "q": "根據衛生福利部109年2月17日衛部醫字第1091660695號函，下列何者不是「109～110年度 醫院醫療品質及病人安全工作目標」？", "A": "促進醫療人員間及醫病間之有效溝通", "B": "營造病人安全文化及落實病人安全事件管理", "C": "強化醫院火災預防與應變措施", "D": "鼓勵病人及其家屬參與病人安全工作", "year": 110, "ans": "C", "id": "110-23"}, {"num": 24, "q": "下列何項業務已經超出專科護理師及訓練專科護理師之醫療業務範圍？", "A": "未及於肌肉及肌腱之表層傷口縫合", "B": "周邊動脈導管置入及拔除", "C": "自主開立常規使用之藥物處方醫囑", "D": "石膏固定及拆除", "year": 110, "ans": "C", "id": "110-24"}, {"num": 25, "q": "下列何者為代謝症候群？", "A": "陳先生，BMI = 30 kg / m 2 腰圍 87 公分，空腹血糖值 120 mg / dL", "B": "李小姐，腰圍 8 公分，空腹血糖值 95 mg / dL，膽固醇 220 mg / dL", "C": "陳先生 腰圍 89 公分，空腹血糖值 120 mg / dL，高密度脂蛋白膽固醇 42 mg / dL", "D": "李小姐，腰圍 5 公分，空腹血糖值 110 mg / dL，血壓 136 / 80 mmHg", "year": 110, "ans": "D", "id": "110-25"}, {"num": 26, "q": "50歲停經婦女，BMI為22kg/m2，健康檢查發現其HbA C值為6.7%，醫師建議其先 1 調整生活型態。病人想藉由運動改善其血糖控制，下列敘述何者較不合適？ 僅供參考", "A": "運動過程中應控制心跳勿超過 100 次 / 分鐘，以免增加心臟負擔", "B": "適度的重量訓練可以增進肌力與肌耐力，有助於血糖控制", "C": "快走與慢跑等有氧運動是不錯的選擇，可改善心肺能力與身體組成", "D": "這樣的運動策略屬於三段五級中的次級預防，旨在健康促進", "year": 110, "ans": "A", "id": "110-26"}, {"num": 27, "q": "下列何者不屬於專科護理師工作之職責？", "A": "在醫師指示下開立藥物處方與管制口服藥方等用藥", "B": "擬訂護理問題提供護理措施，病人及家屬之護理指導及諮詢", "C": "協助執行緊急救護，可執行心臟整流術 ( cardioversion )", "D": "代為開立預立特定醫療流程表單，如入院許可單等", "year": 110, "ans": "AC", "id": "110-27"}, {"num": 28, "q": "孫先生罹癌多年，最近一次因為腫瘤轉移入院，家屬偷偷告訴專科護理師病人希望放棄 治療，下列何者為專科護理師較恰當之回應？", "A": "「生病這麼多年，一定要堅持下去。」", "B": "「現在醫藥這麼發達，一定可以找到方法。」", "C": "「你是不是很擔心？你的看法是什麼？」", "D": "「我會跟主治醫師說，再和你們討論。」", "year": 110, "ans": "C", "id": "110-28"}, {"num": 29, "q": "專科護理師及訓練期間專科護理師除可執行護理人員之業務，並得於醫師監督下執行 醫療業務，下列何者不屬於其範圍及項目？", "A": "鼻胃管置入", "B": "Nelaton 導管更換與灌洗", "C": "中央靜脈導管置入", "D": "陰道擴張器 ( 鴨嘴器 ) 置入", "year": 110, "ans": "C", "id": "110-29"}, {"num": 30, "q": "某醫院因 COVID - 19 疫情之故，要求住院與陪病家屬皆須以 PCR 檢測確認無染疫方 可住院。陳太太因陣痛至該院就診待產，接受診療後在等待 PCR 過程中胎心音下降 而緊急剖腹生產。下列敘述何者錯誤？", "A": "醫院如此規定枉顧病人權益，應處以罰鍰", "B": "等待過程中有醫療人員予以診治，醫院處置得宜", "C": "陳先生不得拒絕 PCR 檢測，應主動配合採檢", "D": "此案例無違反護理師法，並無拖延救治之事實", "year": 110, "ans": "A", "id": "110-30"}, {"num": 31, "q": "陳先生，55歲，為貿易公司高階主管，工作忙碌且壓力大。健康檢查發現其 BMI高達 34kg/m2，總膽固醇395mg/dL，還有嚴重的脂肪肝。主訴爬樓梯容易喘不過氣來，無法 做激烈運動。針對陳先生狀況，下列何者建議較為合適？", "A": "採用生酮飲食，改善脂肪肝、降低膽固醇", "B": "以公高強度有氧運動，告如拳擊有氧，快速試降低體重與高血脂 題", "C": "減少熱量，每日熱量攝取控制於 1,000 大卡，快速達到減重目標", "D": "增加日常生活中的活動量，如每日 1 萬步、快走", "year": 110, "ans": "D", "id": "110-31"}, {"num": 32, "q": "有關丹佛發展測驗-丹佛II(Denver II)針對0～6歲兒童作評量內容之敘述，下列何者不包含 在內？", "A": "語言", "B": "智商", "C": "粗動作", "D": "精細動作", "year": 110, "ans": "B", "id": "110-32"}, {"num": 33, "q": "醫療品質可從結構、過程與結果指標做評量，下列何者不是病人結果面品質指標？ 僅供參考", "A": "臨床照護指引遵從率", "B": "術後噁心嘔吐發生率", "C": "中心靜脈導管感染率", "D": "出院 3 日內再入急診率", "year": 110, "ans": "A", "id": "110-33"}, {"num": 34, "q": "有關採用醫療決策共享的臨床情境 下列何者最不適當？", "A": "目前還未有明確實證結果的處置與用藥", "B": "唯一具有實證基礎的臨床常規照護", "C": "需要長期服用多種藥物", "D": "醫療不確定性高", "year": 110, "ans": "B", "id": "110-34"}, {"num": 35, "q": "以健康信念模式為依據，評估婦女對於乳房攝影檢查之意願，下列何者評估結果屬於 個人信念？", "A": "「我不知道飲食型態跟乳癌有關係。」", "B": "60 歲女性，白人，有家族乳癌病史", "C": "「我媽媽就是死於乳癌，我很擔心自己會跟她一樣。」", "D": "教育程度為大學畢業，且為執業中之臨床護理師", "year": 110, "ans": "C", "id": "110-35"}, {"num": 36, "q": "醫療品質監測指標包括結構、過程與結果三個面向，下列敘述何者錯誤？", "A": "醫療照護所需之資材資源，為結構面指標之一", "B": "醫療診斷與處置適當性，為過程面指標之一", "C": "結構面的評估與過程有關，但與結果面不一定直接相關", "D": "相較於過程面，結果面被視為比較具敏感性的品質評估方法", "year": 110, "ans": "D", "id": "110-36"}, {"num": 37, "q": "當醫院發生不良事件，採用「根本原因分析(RCA)」來進行調查時，下列何者屬於釐清 事件發生的階段？", "A": "組織根本原因分析的團隊", "B": "找出近端原因", "C": "確認根本原因", "D": "設計改善的行動方案", "year": 110, "ans": "B", "id": "110-37"}, {"num": 38, "q": "「安寧緩和醫療條例」是為尊重末期病人之醫療意願及保障其權益而制定，患有下列情況 的病人都有可能是該條例所稱的末期病人，但何者最能確定為末期狀況？", "A": "急性心肌梗塞合併心因性休克 ( cardiogenic shock )", "B": "敗血症合併急性腎衰竭 ( acute renal failure )", "C": "肝硬化合併自發性細菌性腹膜炎 ( spontaneous bacterial peritonitis )", "D": "癌症合併難治型惡病質 ( refractory cachexia )", "year": 110, "ans": "D", "id": "110-38"}, {"num": 39, "q": "專科護理師進行嚴格的評讀臨床照護指引，過程中發現新的骨折超音波檢查偽陰性 很高，此為下列何項實證評讀結果？", "A": "可信度", "B": "可應用性", "C": "臨床重要性", "D": "病人的期望", "year": 110, "ans": "A", "id": "110-39"}, {"num": 40, "q": "AGREE(The Appraisal of Guidelines,Research and Evaluation)是目前國際上公認可 有效評價臨床照護指引品質的工具，包括六大領域的評量面向，下列敘述何者正確？ 公告試題", "A": "評估指引發展所需的經濟效益", "B": "評估指引發展過程的公開透明程度", "C": "評估指引的臨床照護內容適當性", "D": "評估指引推薦內容所使用證據的品質", "year": 110, "ans": "BCD", "id": "110-40"}, {"num": 41, "q": "營造病人安全文化及落實病人安全事件管理，衛福部列入 109 ～ 10 年醫院醫療品質 及病人安全工作目標之一，對醫療機構病人安全文化的評量構面 下列何者錯誤？", "A": "評量工作人員對機構的認同", "B": "評量工作人員對工作的滿意", "C": "評量工作人員對壓力的認知", "D": "評量工作人員對管理的感受", "year": 110, "ans": "A", "id": "110-41"}, {"num": 42, "q": "有關根本原因分析(root cause analysis,RCA)的敘述，下列何者正確？", "A": "為前瞻性分析，針對流程或步驟進行風險評量，找出適當改進方案", "B": "為回溯性分析，焦點在 為事件 針對人員教育加以評估分析", "C": "為回溯性分析，焦點在事件，分析過程，避免未來類似事件再發生", "D": "為前瞻性分析，針對系統與過程進行分析，而非歸咎業務執行者", "year": 110, "ans": "C", "id": "110-42"}, {"num": 43, "q": "下列何者不建議接種人類乳突病毒(Human Papillomavirus,HPV)疫苗？", "A": "男性高三學生", "B": "懷孕 6 週女性", "C": "48 歲停經婦女", "D": "女性高三學生", "year": 110, "ans": "BC", "id": "110-43"}, {"num": 44, "q": "針對低健康識能的病人，專科護理師在溝通時可透過下列何項最適當的措施，以協助 個案理解衛教的內容？", "A": "考量資訊落差，應儘量避免使用多媒體", "B": "避免衛教時間太長無法專心，可省去回覆示教", "C": "會談時使用白話文，避免醫療術語", "D": "主要的衛教對象以家屬為主，確保照顧者學會", "year": 110, "ans": "C", "id": "110-44"}, {"num": 45, "q": "應用臨床實證照護，正確解讀與使用實證證據是專科護理師重要的核心能力之一，下列 敘述何者不適宜？", "A": "擬訂病人個別化之臨床照護決策", "B": "建立照護的政策、程序與標準化", "C": "隨時修訂或推翻臨床照護指引", "D": "客觀評值臨床實務的照護成效", "year": 110, "ans": "C", "id": "110-45"}, {"num": 46, "q": "在新冠肺炎疫情期間，陳先生回南部與家人聚餐，當回到北部工作時身體不適就醫，診 斷為新冠肺炎住院治療，疫情調查人員將其個人診斷告知家人、餐廳與公司，該情況是 否有不當洩漏病人隱私？而此原因為何？", "A": "有，陳先生可能因病受他人異樣眼光", "B": "有，餐廳因停業消毒，損失嚴重", "C": "沒有，得了新冠肺炎的病人沒有隱私權", "D": "沒有，對社會負有更高責任，疫情調查以阻斷傳播鏈", "year": 110, "ans": "D", "id": "110-46"}, {"num": 47, "q": "30 歲男性病人，前兩週剛得過腮腺炎但已經康復，抱怨這兩天陰囊有腫脹和疼痛的 症狀。身體檢查發現雙側之睪丸有壓痛之情形，下列何者為最可能的診斷？", "A": "睪丸炎 ( orchitis )", "B": "附睪炎 ( epididymitis )", "C": "睪丸腫瘤 ( testicular tumor )", "D": "精索靜脈曲張 ( varicocele )", "year": 110, "ans": "A", "id": "110-47"}, {"num": 48, "q": "45歲男性來到急診室，抱怨突然出現嚴重的右側腹痛，並且會轉移到右側腹股溝和生殖 器的位置。他否認有任何外傷史、排尿困難、頻尿、夜尿或發燒等症狀。身體檢查發現 生殖器、腹部和直腸都是正常，但右側肋椎角(costovertebral angle)敲擊時會疼痛，同時 尿液檢查也出現紅血球。下列何者為最可能的診斷？", "A": "腎公盂腎炎 ( pyeloneph 告 ritis ) 試", "B": "腎結石 ( renal s 題 tone )", "C": "睪丸扭轉 ( testicular torsion", "D": "急性前列腺炎 ( acute prostatitis )", "year": 110, "ans": "B", "id": "110-48"}, {"num": 49, "q": "56歲男性病人，健康檢查時發現有血尿的情形，但是他否認有腹痛 排尿困難、頻尿或 尿急等症狀。這位男性每天抽一包菸已經持續35年以上，且在印刷行業工作多年。下列 何種疾病最可能導致其血尿？", "A": "急性前列腺炎 ( acute Prostatitis )", "B": "膀胱癌 ( bladder carcinoma )", "C": "尿路結石 ( urinary stones )", "D": "膀胱炎 ( cystitis )", "year": 110, "ans": "B", "id": "110-49"}, {"num": 50, "q": "觸診腹部時，在非病態的狀況，下列何種器官最不會被觸摸到？", "A": "肝臟", "B": "胰臟", "C": "乙狀結腸", "D": "膀胱", "year": 110, "ans": "B", "id": "110-50"}, {"num": 51, "q": "28歲女性病人 主訴頭痛發作斷斷續續已經 10年了。頭痛的位置會從前額一直痛到後 腦，通常工作較忙或是睡眠不足時比較容易發生，常常睡一覺起來就好了，一般的頭痛 消炎藥通常也會有效。下列何種特徵最常和這種類型的頭痛有關？", "A": "頭痛發作前約 30 分鐘有先兆 ( aura )", "B": "一般會伴隨噁心和嘔吐等症狀", "C": "開始和結束時間都不會很精確地被注意到", "D": "與經常服用口服避孕藥相關", "year": 110, "ans": "C", "id": "110-51"}, {"num": 52, "q": "病人長期有尿急、頻尿和突然漏尿的症狀，甚至需要使用成人紙尿布。此外，每當咳 嗽、大笑或打噴嚏時，也會出現漏尿的症狀。檢查之後發現，沒有尿路感染，也沒有糖 尿病或腎臟病史。下列何者為最可能的診斷？", "A": "急迫性尿失禁 ( urge Incontinence )", "B": "神經性膀胱 ( neurogenic bladder )", "C": "壓力性尿失禁 ( stress Incontinence )", "D": "混和性尿失禁 ( mixed Incontinence )", "year": 110, "ans": "D", "id": "110-52"}, {"num": 53, "q": "42歲病人，抱怨最近容易頭暈、頭痛，聽力愈來愈不好，左側的耳鳴也愈來愈嚴重。檢 查發現左耳鼓膜的顏色較右耳紅，Weber音叉測驗發現右側較大聲。下列何者最有可能 導致其症狀？", "A": "聽神經瘤", "B": "梅尼爾氏症", "C": "中耳炎", "D": "耳垢填塞", "year": 110, "ans": "A", "id": "110-53"}, {"num": 54, "q": "病人的呼吸模式(respiratory pattern)呈現有規律的漸強及漸弱，較深較強的呼吸與呼吸終 止的狀況交錯出現，這種Cheyne-Strokes呼吸模式不會發生在下列何種病人身上？", "A": "右大腦栓塞 ( right cerebral infarction )", "B": "左大腦出血 ( left cerebral hemorrhage )", "C": "代謝性昏迷 ( metabolic coma )", "D": "急性脊髓損傷 ( acute spinal injury )", "year": 110, "ans": "D", "id": "110-54"}, {"num": 55, "q": "75歲病人因記憶力退化的問題，被家人帶來看診。家人說，這幾個月來除了失憶之外， 其他症狀愈來愈嚴重也愈來愈多，像是跌倒了好幾次、經常尿失禁等等，最近走路的步 態也愈來愈不穩。下列何者為其最可能的診斷？", "A": "阿茲海默症 ( Alzheimer disease )", "B": "正常壓力腦水腫 ( normal pressure hydrocephalus )", "C": "路易士體失智症 ( dementia with Lewy bodies )", "D": "巴金森氏症 ( Parkinson ' s disease )", "year": 110, "ans": "B", "id": "110-55"}, {"num": 56, "q": "18歲的體操運動員在練習時，突然聽到左膝發出「啪」的一聲，之後感覺膝蓋非常疼 痛，也立即腫脹。檢查發現左膝有明顯積液，anterior drawer test和Lachman test陽性， McM 公 urray test陰性。下告列何者為其最可能的試診斷？ 題", "A": "前十字韌帶撕裂", "B": "後十字韌帶撕裂", "C": "內側半月板破裂", "D": "外側半月板破裂", "year": 110, "ans": "A", "id": "110-56"}, {"num": 57, "q": "20歲病人，最近頻繁參加羽球校隊的訓練，主訴前臂近端出現疼痛，且在手肘伸直之狀 態下，在做手腕伸直動作時施加外部之阻力 會讓疼痛加劇。最近沒有發生撞擊或外 傷，下列何者為其最可能的診斷？", "A": "外上髁肌腱炎 ( lateral epicondylar tendinitis )", "B": "鷹僅嘴滑囊炎 ( olecrano供n bursitis ) 參考", "C": "二頭肌肌腱炎 ( biceps tendini is )", "D": "腕隧道症候群 ( carpal tu nel synd ome )", "year": 110, "ans": "A", "id": "110-57"}, {"num": 58, "q": "40歲病人，工作常要搬一些重型設備，最近出現嚴重的右下背部疼痛，並從右臀部的 後部輻射到膝蓋區域，但在臥床休息後疼痛會有改善。檢查時發現，病人腰部觸診會 有壓痛，右腿在做straight-leg maneuver時，在80°會讓背痛加劇，而左腿straight-leg maneuver 則僅會引起大腿的疼痛。除此之外，病人的感覺、肌力和反射都是正常的。 下列何者為其最可能的診斷？", "A": "薦腰椎椎間盤突出", "B": "脊椎周邊膿瘍", "C": "薦腰椎肌肉拉傷", "D": "薦腰椎壓迫性骨折", "year": 110, "ans": "C", "id": "110-58"}, {"num": 59, "q": "50歲病人，前兩個月才因甲狀腺癌接受雙側之全甲狀腺切除手術，最近開始，他抱怨臉 部有些感覺異常的現象。檢查時發現，當你輕輕敲擊病人面部右側時，右側臉部肌肉會 跟著收縮。下列何者為其最可能的診斷？", "A": "高血鉀", "B": "低血鉀", "C": "高血鈣", "D": "低血鈣", "year": 110, "ans": "D", "id": "110-59"}, {"num": 60, "q": "一名健檢民眾，BMI約26kg/m2，平時覺得身體還算健康，沒有什麼身體的不適，但在 健檢之後，卻被醫師告知有亞臨床甲狀腺低下症(subclinical hypothyroidism)，有關他的 抽血結果，下列何者為其最可能的診斷？", "A": "T 4 值正常，TSH 值偏低", "B": "T 4 值正常，TSH 值偏高", "C": "T 4 值正常，TSH 值正常", "D": "T 4 值偏低，TSH 值稍低", "year": 110, "ans": "B", "id": "110-60"}, {"num": 61, "q": "70歲病人，因腹部脹痛被家人送來急診。腹部診察發現腹部隆起、高活動性腸音 (high- pitch hyperactive bowel sound)、叩診呈廣泛鼓音，而觸診發現廣泛性輕度壓痛。依據上 述線索，在下列各項中何者應視為最優先的初步臆斷？", "A": "腸阻塞", "B": "腸穿孔", "C": "腸壞死", "D": "腸發炎", "year": 110, "ans": "A", "id": "110-61"}, {"num": 62, "q": "病人因意識不清被送到急診，血壓：80/40mmHg，心電圖檢查顯示如圖(一)，須立即給予 病人的治療，下列何者正確？ 圖(一)", "A": "頸動脈竇按摩", "B": "去顫電擊", "C": "同步整流", "D": "心肺復甦", "year": 110, "ans": "C", "id": "110-62"}, {"num": 63, "q": "45歲病人，無肝炎病史，因易倦及胃口變差住院。檢查發現ALT：555IU/L、AST：238 公告試題 IU/L；肝炎標記檢查anti-HAV IgM(－)、HBsAg(＋)、anti-HBs(－)、anti-HCV(－)。 若要進一步了解此次肝炎發作的原因，醫師建議加作以下肝炎標記檢查，下列何者為 非必要的檢查？", "A": "anti - HAV IgG", "B": "anti - HBc IgM", "C": "HBeAg", "D": "an i HDV", "year": 110, "ans": "A", "id": "110-63"}, {"num": 64, "q": "55歲女性病人，主訴疲憊、皮膚乾燥、眼皮腫、腳脛前腫、會怕冷、容易便秘，身體檢 查血壓134/94mmHg，脈搏64次/分鐘，甲狀腺觸診輕微腫大，甲狀腺刺激激素(TSH) 66mU/L；甲狀腺素free T4：0.2ng/dL，下列何者正確？", "A": "屬僅於次發性甲狀腺功供能低下 參考", "B": "自體免疫引起甲狀腺功能低下的原因較罕見", "C": "體內結締組織的纖維母細胞產生過多黏多醣類，引起黏液腫", "D": "少於 60 歲沒有心臟疾病的病 ，levothyroxine 起始劑量為 200 mg", "year": 110, "ans": "C", "id": "110-64"}, {"num": 65, "q": "年輕男性因右側陰囊腫大而求診，發生時無明顯疼痛。於診間發現平躺時腫大會消失， 站立時又出現。下列何者為最可能的診斷？", "A": "腹股溝疝氣 ( inguinal - scrotal hernia )", "B": "睪丸扭轉 ( testicular torsion )", "C": "睪丸癌 ( testicular cancer )", "D": "急性副睪炎 ( acute epididymitis )", "year": 110, "ans": "A", "id": "110-65"}, {"num": 66, "q": "有關胸痛病因與典型症狀的敘述，下列何者最為適當？", "A": "胃食道逆流 ( gastroesophageal reflux ) 造成的胸痛多以胸骨下的沉重感與壓痛來表現，", "B": "急性冠心症 ( acute coronary syndrome ) 造成的心絞痛為突發而嚴重的尖銳撕裂痛，由", "C": "主動脈剝離 ( aortic dissection ) 造成的胸部不適多以胸部正中央灼熱疼痛來表現", "D": "肺炎造成的肋膜性疼痛 ( pleuritic pain ) 為持續漸進的表淺性疼痛，因咳嗽與深呼吸而", "year": 110, "ans": "D", "id": "110-66"}, {"num": 67, "q": "60歲病人，因呼吸不順住院檢查，胸部X光發現右側大量肋膜腔積液，積液抽出為暗紅 色，積液LDH：160U/L,血清LDH：200U/L，下列敘述何者正確？", "A": "造成此積液的原因是全身性靜水壓或滲透壓的問題", "B": "肺部惡性腫瘤要列入重要考量", "C": "此積液符合漏出液 ( transudate ) 的定義", "D": "心衰竭或肝硬化是此類積液常見的原因", "year": 110, "ans": "B", "id": "110-67"}, {"num": 68, "q": "60歲病人，因全身虛弱、胸部不適、合併呼吸困難入院治療。病人心跳110次/分鐘，血 壓80/50mmHg，身體檢查時兩側呼吸音正常，肺部叩診呈兩側反響音(resonant)；但心 音微弱，頸靜脈怒張；心電圖呈現低電壓 ( low voltage ) 與電氣交替現象 ( electrical alternans)。下列何者為其最有可能罹患的疾病？", "A": "鬱血性心衰竭 ( congestive heart failure )", "B": "肺動脈栓塞 ( pulmonary embolism )", "C": "大量肋膜積水 ( pleural effusion )", "D": "心包膜填塞 ( cardiac tamponade )", "year": 110, "ans": "D", "id": "110-68"}, {"num": 69, "q": "一位69歲家屬在病房被看見倒下不醒人事，你立即上前評估，發現已沒有呼吸、沒有脈 搏，公同事也快速地將急告救物品與去顫器取至試身邊，此時心律如題圖(二)，下一處置 步驟以 下列何者最為優先？ 圖(二) 僅供參考", "A": "給予 200 J 去顫電擊", "B": "給予 Epinephrine 1 mg IV push", "C": "立即使用甦醒球 ( BVM ) 吹氣供氧，以提供足夠的氧氣", "D": "給予插氣管內管以建立高級呼吸道", "year": 110, "ans": "A", "id": "110-69"}, {"num": 70, "q": "40歲病人患有糖尿病，無其他慢性疾病史，主訴多種不適症狀，血糖測得 600mg/dL， 下列何項較不像是該病人的其餘檢驗結果？", "A": "血液滲透壓下降至 250 mosmol / mL", "B": "血液中納離子濃度下降至 124 mEq / L", "C": "肌酐酸 ( creatinine ) 上升合併腎前性氮血症 ( pre - renal azotemia )", "D": "呈現代謝酸中毒現象，血中碳酸氫根 ( HCO", "year": 110, "ans": "A", "id": "110-70"}, {"num": 71, "q": "18 歲病人，頭暈目眩、嘴唇及兩側指尖發麻至急診就醫。血壓 140 / 70 mmHg，脈搏 110次/分鐘，呼吸30次/分鐘，體溫36.5°C。未使用氧氣時其動脈血氧：pH 7.52， PaO 96mmHg，PCO 25mmHg，HCO − 18mEq / L。有關此病患血中酸鹼平衡之判 2 2 3 斷，何者正確？", "A": "代謝性鹼中毒無呼吸代償", "B": "呼吸性酸中毒合併代謝代償", "C": "代謝性酸中毒合併呼吸代償", "D": "呼吸性鹼中毒合併代謝代償", "year": 110, "ans": "D", "id": "110-71"}, {"num": 72, "q": "一位洗腎病人因頭暈、心悸及全身倦怠前來看診。其心電圖如圖(三)，最有可能符合下 列何項檢驗結果？ 圖(三)", "A": "血中鈣 ( calcium ) 濃度 11.5 mg / dL", "B": "血中鉀 ( potassium ) 濃度 7.5 mEq / L", "C": "心肌酵素 ( troponin I ) 濃度 .2 g / mL", "D": "血中游離四碘甲狀腺素 ( free T 4 ) 濃度 3.0 ng / dL", "year": 110, "ans": "B", "id": "110-72"}, {"num": 73, "q": "25歲病人，頭痛發燒四天後因意識不清送醫，其腦脊髓液檢查結果為： pressure： 30 cmH O 、WBC： 18 0cells / mm3、lymphocyte： 20 % PMN： 80 %、 2 sugar：35mg/dL(其血中sugar 110mg/dL)、protein：300mg/dL，該病患較可能為何類 型的腦膜炎？ 僅供參考", "A": "隱球菌", "B": "結核菌", "C": "細菌性", "D": "病毒性", "year": 110, "ans": "C", "id": "110-73"}, {"num": 74, "q": "有關凝血功能凝血酶原時間(PT 檢驗，下列敘述何者最適當？", "A": "可測定血小板下降及功能異常", "B": "檢查外在與共同路徑的異常", "C": "常用於監控 eparin 治療的療效", "D": "瀰漫性血管內凝血 ( DIC ) 其 PT 會下降", "year": 110, "ans": "B", "id": "110-74"}, {"num": 75, "q": "專科護理師得於醫師監督下執行侵入性人體醫療業務，不包含下列何者？", "A": "胸管 ( chest tube ) 拔除", "B": "未及於肌肉及肌腱之表層傷口局部麻醉與縫合", "C": "第四期壓傷 ( pressure ulcer ) 傷口換藥與清創", "D": "周邊動脈導管 ( arterial line ) 置入及拔除", "year": 110, "ans": "C", "id": "110-75"}, {"num": 76, "q": "病人被通報為嚴重特殊傳染性肺炎(COVID-19)確診個案，需要採檢其咽喉或鼻咽拭子 檢體，下列何者正確？", "A": "經醫師同意可由專科護理師完成", "B": "專科護理師可在醫師監督下完成", "C": "專科護理師可獨立完成採檢工作", "D": "必須由醫師完成", "year": 110, "ans": "D", "id": "110-76"}, {"num": 77, "q": "病人車禍導致頭部外傷、氣胸、小腿骨折住院，吞嚥時容易嗆到還有疼痛問題，根據 「專科護理師於醫師監督下執行醫療業務辦法」，下列何者不屬於專科護理師可以執行 的業務？", "A": "石膏拆除", "B": "胸管拔除", "C": "第一次鼻胃管裝置", "D": "第一次氣管內管置換", "year": 110, "ans": "D", "id": "110-77"}, {"num": 78, "q": "35歲病人因嚴重呼吸喘而求診。血氧飽和度(SpO )99%。視診呈現深而快之呼吸，聽診 2 兩側呼吸音正常，叩診兩側均反響音(resonant)。血中D-dimer正常。下列何者為較可能 的診斷？", "A": "大葉性肺炎 ( lobar pneumonia )", "B": "糖尿病酮酸血症 ( DKA )", "C": "嚴重肺動脈栓塞 ( pulmonary embolism )", "D": "張力性氣胸 ( tension pneumothorax )", "year": 110, "ans": "B", "id": "110-78"}, {"num": 79, "q": "65歲病人，30分鐘前急性胸痛而就醫，血壓100/70mmHg。心電圖顯示Lead II,III,AVF 有ST波段上升。下列何項敘述較不正確？", "A": "懷疑為 ST 波段上升的心肌梗塞，應儘速給予兩種抗血小板藥物", "B": "若公兩側呼吸音有廣泛告囉音 ( rales ) ，胸部試 X 光呈現肺水腫，則題為 Killip 分類第三 級", "C": "應再做一張右側心電圖來判斷是否為右心室心肌梗塞", "D": "此病患有可能需要做緊急心導管，而心肌酵素的數值為重要參考依據", "year": 110, "ans": "D", "id": "110-79"}, {"num": 80, "q": "病人於晚餐後突發腹痛被送來急診 被抬上推床時呈現痛苦表情且抗拒快速移動身體， 平躺後靜止在床而呼吸甚淺。腹部檢查呈現明顯肌肉緊繃且有廣泛性反彈痛，未聽到腸 蠕動音。下列何者為最可能的診斷？", "A": "消化性潰瘍穿孔", "B": "胰臟炎膿瘍破裂", "C": "闌尾炎膿瘍破裂", "D": "大腸癌壞死穿孔", "year": 110, "ans": "A", "id": "110-80"}, {"num": 1, "q": "依據「臺灣護理人員法」（民國109年修正），下列何者不屬於專科護理師之執業範疇？", "A": "麻醉護理與照護", "B": "醫院加護病房照護", "C": "健康促進及衛教", "D": "社區居家在宅接生", "year": 111, "ans": "D", "id": "111-1"}, {"num": 2, "q": "肺癌高居臺灣癌症死因第一位，下列何者為2022年國民健康署之肺癌早期偵測計畫，針對 肺癌特定風險者的建議？", "A": "50 歲以上民眾，每 2 年可做 1 次胸部低劑量電腦斷層攝影檢查", "B": "65 歲以上民眾，每年可做 1 次胸部 X 光篩檢", "C": "50 歲以上民眾，每 2 年可做 1 次胸部 X 光檢查", "D": "40 歲以上民眾，每 3 年可做 1 次胸部 X 光篩檢", "year": 111, "ans": "A", "id": "111-2"}, {"num": 3, "q": "醫療品質可從三個構面做指標制定，即結構面指標 (structure indicators)、過程面指標 (process indicators)、與結果面指標(outcome indicators)，下列敘述何者錯誤？", "A": "具備專科護理師執照者執行業務的比值屬於結果面指標", "B": "醫事人員洗手正確率屬於過程面指標", "C": "手術後傷口感染率屬於結果面指標", "D": "醫事人力與病床的比值屬於結構面指標", "year": 111, "ans": "A", "id": "111-3"}, {"num": 4, "q": "醫療品質管理的手法及工具中，常用的柏拉圖是運用於問題解決流程中哪個步驟？", "A": "問題確認", "B": "回饋改善", "C": "成果評估", "D": "提出方案", "year": 111, "ans": "D", "id": "111-4"}, {"num": 5, "q": "品質改善專案常用的特性要因圖(cause and effect diagram)，主要是找出問題的根本原因， 所以又稱為？", "A": "魚骨圖", "B": "甘特圖", "C": "管制圖", "D": "流程圖", "year": 111, "ans": "A", "id": "111-5"}, {"num": 6, "q": "依據「人體器官移植條例」（民國110年修正）對於自活體摘取器官施行移植手術的規定， 下列何者正確？", "A": "捐贈者滿 20 歲以上，意識清楚，本人簽署同意書即可", "B": "捐贈給配偶時，一定要結婚滿兩年才能捐贈", "C": "受贈者以組織配對合宜性為主，不一定要有親屬關係", "D": "捐贈的案件，要經過醫院醫學倫理委員會審查通過才能捐贈", "year": 111, "ans": "D", "id": "111-6"}, {"num": 7, "q": "照護品質維護為專科護理師的核心能力之一，在參與急診病人跌倒根本原因分析 (root cause analysis,RCA)時，與小組成員運用時序法，列出事件發生時間的先後順序，為根本 原因分析的哪一個階段？", "A": "RCA 前的準備", "B": "找出近端原因", "C": "進行危害分析", "D": "確認根本原因", "year": 111, "ans": "B", "id": "111-7"}, {"num": 8, "q": "美國醫學研究院(IOM)提出有效改善醫療品質的作法，應該達成滿足服務病人的六大目標， 下列何者錯誤？", "A": "安全性", "B": "即時性", "C": "公平", "D": "尊重", "year": 111, "ans": "D", "id": "111-8"}, {"num": 9, "q": "教育方案設計中，為了解教學成效，下列何者較不適宜？", "A": "宜採用多元評估策略", "B": "評量技能方法可採用筆試與口頭報告了解學習成效", "C": "依據教學目標擬定教學評量策略", "D": "客觀結構式臨床測驗 ( OSCE ) 屬於綜合性評量，可測量學員臨床能力之表現", "year": 111, "ans": "B", "id": "111-9"}, {"num": 10, "q": "下列何者不屬於Hamric 模式所規劃的專科護理師核心能力？", "A": "健康政策的倡議與推動能力", "B": "以病人為中心的跨團隊照護能力", "C": "照護過程有臨床實務的品質提升能力", "D": "將新知識轉換到實務中的能力", "year": 111, "ans": "A", "id": "111-10"}, {"num": 11, "q": "有效的會談可以收集病人資料，協助病人解決問題，建立良好的治療性人際關係。下列 何者不屬於治療性會談的技巧？", "A": "給予建議性的指示", "B": "鼓勵做比較", "C": "沉默 ( silence )", "D": "重述 ( restating )", "year": 111, "ans": "A", "id": "111-11"}, {"num": 12, "q": "國民健康署為改善老年人生活安全與照護品質，2021年2月發表《老人防跌工作手冊》， 若經評估長者的下肢肌力不足或步態及平衡異常，除轉介相關科別醫師診斷外，下列何 者不是主要考慮轉介之項目？", "A": "物理治療師", "B": "職能治療師", "C": "附近可參加之運動團體", "D": "社工師", "year": 111, "ans": "D", "id": "111-12"}, {"num": 13, "q": "專科護理師規劃在職教育課程時，為達到教學成效，第一步工作為何？", "A": "評估學習者需求", "B": "確認教學方法", "C": "確立教學目標", "D": "擬定教學策略", "year": 111, "ans": "A", "id": "111-13"}, {"num": 14, "q": "王先生表示：「我要不要選擇另一種治療方式呢？」，專科護理師回答：「您認為呢？」， 此時專科護理師是使用下列何種會談溝通技巧？", "A": "強化 ( post reinforcement )", "B": "澄清 ( clarification )", "C": "促進 ( facilitation )", "D": "反映 ( reflection )", "year": 111, "ans": "D", "id": "111-14"}, {"num": 15, "q": "病人術後於病房練習走路，跌倒撞到頭部，護理師聯繫正在手術中的主治醫師，主治醫師 以電話指示專科護理師，立即進行身體評估、安排電腦斷層，並會診神經內科及向病人 與家屬說明病況和處置。有關以上專科護理師之行為，下列敘述何者正確？", "A": "說明病情不在專科護理師於醫師監督下可執行的業務範圍內，專科護理師應告知家屬，", "B": "跌倒為突發事件，不屬於預立特定醫療流程範圍，故專科護理師不應代為開立電腦斷層", "C": "執行病人及家屬有關醫學與護理之諮詢及病情說明，本屬專科護理師之執業範圍，行為", "D": "專科護理師僅可向家屬說明身體評估的結果，而安排電腦斷層與會診神經內科，屬於", "year": 111, "ans": "C", "id": "111-15"}, {"num": 16, "q": "依據醫病共享決策SHARE五步驟，下列順序何者正確？ ①對決策結果的評值 ②了解病人對疾病的看法、治療期待與偏好 ③幫助病人了解各治療選項及其優缺點 ④尋求病人同意參與決策 ⑤與病人達成共同決策", "A": "①②③⑤④", "B": "②④①⑤③", "C": "④③②⑤①", "D": "②①④③⑤", "year": 111, "ans": "C", "id": "111-16"}, {"num": 17, "q": "在醫療照護團隊中，為傳遞正確醫療訊息，達到以病人為中心的最佳照護成果，身為照護 團隊一員的你，會運用醫療團隊資源管理 (team resource management ,TRM)模組中的 哪個模組？", "A": "情境監測 ( situation monitoring )", "B": "領導風格 ( leadership )", "C": "溝通 ( communication )", "D": "互助支援 ( mutual support )", "year": 111, "ans": "C", "id": "111-17"}, {"num": 18, "q": "醫療照顧者提供病人衛生教育，協助其獲得健康相關行為改變，達到自我照顧與健康促進， 下列敘述何者錯誤？", "A": "提供病人疾病衛教前，須了解病人對疾病照護認識的程度", "B": "依照醫療照顧人員的業務方便及可近性，選定單一教學方法及衛教工具", "C": "每日評估病人可執行的照顧措施狀況，可激發病人學習參與的動機", "D": "清楚確定病人疾病照顧學習目標", "year": 111, "ans": "B", "id": "111-18"}, {"num": 19, "q": "根據衛生福利部頒定的「專科護理師於醫師監督下執行醫療業務辦法」第4條規定，須 成立作業小組，並且明訂專師及訓練專師執行監督下之醫療業務時之標準作業程序， 下列敘述何者正確？", "A": "由護理部主責，定期召開會議", "B": "標準作業程序須訂定每半年更新一次", "C": "須訂定回報病人狀況與處置結果之機制", "D": "經過外部專家審核，方可實施", "year": 111, "ans": "C", "id": "111-19"}, {"num": 20, "q": "根據1997年Charles等人建立「醫病共享決策」（shared decision making, SDM）照護模式， 下列何者不是決策過程及實踐步驟？", "A": "資訊交換階段", "B": "實證搜尋階段", "C": "商議階段", "D": "決策階段", "year": 111, "ans": "B", "id": "111-20"}, {"num": 21, "q": "「專師及訓練專師執行監督下之醫療業務辦法」第 5 條，有關預立特定醫療流程訂定內容 之規定，下列何者錯誤？", "A": "使用 ICD-10 所羅列的疾病來製作照護流程診斷", "B": "包含書寫紀錄及記錄相關處置或措施", "C": "明訂專師及訓練專師應具備之特定訓練標準或要件", "D": "明訂監督之醫師及監督方式", "year": 111, "ans": "A", "id": "111-21"}, {"num": 22, "q": "有關啟動與執行「預立醫療決定」之敘述，下列何者不符合條件標準？", "A": "臨床失智評估表 ( clinical dementia rate , CDR ) 得分 3 分者", "B": "三個月前車禍致嚴重腦傷，格拉斯哥昏迷指數 ( GCS ) 3 分者", "C": "腦梗塞後六個月，格拉斯哥昏迷指數 ( GCS ) 3 分者", "D": "阿茲海默症功能性評估量表 (functional assessment staging test , FAST ) 得分 8 分者", "year": 111, "ans": "B", "id": "111-22"}, {"num": 23, "q": "專科護理師下班後，在停車場被病人家屬大聲叫住，無端以言語辱罵，並拉扯頭髮拖拉 至路旁，要求跪地道歉。對此暴力事件的敘述，下列何者錯誤？", "A": "此行為以強暴、脅迫、恐嚇、公然侮辱等方法妨礙醫療業務執行，已違反醫療法", "B": "因未於執行醫療業務期間發生，應以刑法公然侮辱和普通傷害罪認之", "C": "刑法之公然侮辱和普通傷害罪，屬告訴乃論，專科護理師需要主動提出告訴認之", "D": "醫療法於強暴、脅迫、恐嚇等暴力行為的刑責規範，高於刑法規範", "year": 111, "ans": "A", "id": "111-23"}, {"num": 24, "q": "目前國民健康署對於健康民眾所提供之癌症篩檢服務，下列族群何者不符合其標準？", "A": "36 歲張先生，已戒食檳榔 6 年", "B": "55 歲李先生，無大腸癌家族病史", "C": "45 歲陳小姐，父親罹患肺癌", "D": "42 歲王小姐，姑姑5年前罹患乳癌", "year": 111, "ans": "送分", "id": "111-24"}, {"num": 25, "q": "基於行善原則，下列何種處置屬於去除傷害的範疇？", "A": "執行技術前確實洗手", "B": "圍上床欄預防跌落", "C": "協助病人執行關節運動，避免攣縮", "D": "即早進行出院準備服務之規劃", "year": 111, "ans": "C", "id": "111-25"}, {"num": 26, "q": "病人符合下列臨床條件之一，且有預立醫療決定者，醫療機構或醫師得依其預立醫療決定 終止、撤除或不施行維持生命治療或人工營養及流體餵養之全部或一部，下列何者錯誤？", "A": "由二位與該疾病診斷或治療相關之專科醫師確診之末期病人", "B": "不可逆轉之昏迷狀況，若因外傷所致，其意識超過三個月無恢復跡象", "C": "永久植物人狀態，若因外傷所致，其植物人狀態超過六個月無改善跡象", "D": "極重度失智，臨床失智評估量表( clinical dementia rate , CDR ) 達三分以上", "year": 111, "ans": "AB", "id": "111-26"}, {"num": 27, "q": "吸菸是下列癌症的危險因子，其中以何者增加的風險最低？", "A": "肺癌", "B": "口腔癌", "C": "食道癌", "D": "膀胱癌", "year": 111, "ans": "D", "id": "111-27"}, {"num": 28, "q": "下列何者不為肥胖對內分泌與新陳代謝功能的影響？", "A": "血脂異常", "B": "代謝症候群", "C": "第一型糖尿病", "D": "多囊性卵巢症候群", "year": 111, "ans": "C", "id": "111-28"}, {"num": 29, "q": "有關GRADE評核系統(grading of recommendation assessment,development and evaluation) 之應用，下列敘述何者錯誤？", "A": "是針對單一臨床研究進行證據等級分級", "B": "最多可納入七個結果指標", "C": "針對不精確性的評估，在臨床指引及系統性文獻回顧的用法不同", "D": "介入措施的證據等級取決於所有結果指標中證據等級較低者", "year": 111, "ans": "A", "id": "111-29"}, {"num": 30, "q": "在品質改善手法中，目標的設定必須具體可行、能夠量化。有關目標設定依據之敘述， 下列何者錯誤？", "A": "同業或類似工作的實績", "B": "上司的期望及要求", "C": "自我努力的要求", "D": "品管手法熟練度", "year": 111, "ans": "D", "id": "111-30"}, {"num": 31, "q": "下列何者不是應用實證方法提升照護品質的5A步驟？", "A": "提出問題 (ask )", "B": "問題評估 (assessment )", "C": "文獻評讀 (appraise )", "D": "臨床應用 (apply )", "year": 111, "ans": "B", "id": "111-31"}, {"num": 32, "q": "根據考科藍臺灣研究中心2020年更新的《臺灣實證臨床指引發展及更新手冊》，實證臨床 指引撰寫完成之後，建議用於外部審查評估指引品質的評讀工具為何？", "A": "PRISMA", "B": "ROBINS - I", "C": "AGREE II", "D": "GRADE", "year": 111, "ans": "C", "id": "111-32"}, {"num": 33, "q": "有關醫院推動持續品質改善(CQI)之敘述，下列何者錯誤？", "A": "以團隊合作方式達成全面品質管理", "B": "尊重每一部門及員工提出的品質改善方案", "C": "運用大數據分析管理進行品質增進計畫", "D": "以領導者為中心建構醫院核心價值與文化", "year": 111, "ans": "D", "id": "111-33"}, {"num": 34, "q": "有關醫院參加臺灣醫療品質指標系統(TQIS)之敘述，下列何者錯誤？", "A": "品管中心定期提供報表，可與其他機構比較，及早發現異常趨勢即時改善", "B": "醫療單位僅需依據臨床指引提供照顧，品質指標監測及改善是品管中心的責任", "C": "醫療品質監測指標包括結構、過程與結果三個面向", "D": "臨床指標是品質改善與評鑑查核的工具，故指標高低無法直接解釋醫療品質好壞", "year": 111, "ans": "B", "id": "111-34"}, {"num": 35, "q": "新冠肺炎疫情間，媒體報導重症病人進行清醒俯臥，但過去在加護病房未曾使用此技能， 也不知道其對死亡率之效果，故藉由實證方法尋找最佳研究證據，制定醫院新冠肺炎俯臥 的標準，下列何者最不適當？", "A": "擬定 PICO：清醒俯臥是否可降低重症新冠肺炎病人的死亡率", "B": "分析各篇文獻，確認對象與使用情境，擬定適應症、禁忌症以及清醒俯臥的治療流程", "C": "因為新冠肺炎為新興傳染病，故尋找病例對照研究的文獻優於隨機控制試驗文獻", "D": "制定為標準後仍需定期評估照顧成果，運用俯臥對病人的優點，也要避免其他合併症", "year": 111, "ans": "C", "id": "111-35"}, {"num": 36, "q": "有關《國民健康署戒菸教戰手冊》對訂定戒菸計畫(STAR)之敘述，下列何者錯誤？", "A": "S ( set ) ：慎重設定戒菸日，跨出戒菸第一步", "B": "T ( tell ) ：暗自告訴自己，我要開始戒菸了", "C": "A ( anticipate ) ：預期戒菸過程可能會遇到的困難，並嘗試安排處理方式", "D": "R ( remove ) ：將菸與相關一切事物從環境中完全拿掉", "year": 111, "ans": "B", "id": "111-36"}, {"num": 37, "q": "有關健康體能的四大要素之敘述，下列何者錯誤？", "A": "肌耐力就是肌肉力量", "B": "心肺耐力為四大要素中最重要的一項", "C": "柔軟度代表關節可以活動的最大範圍", "D": "身體脂肪百分比是身體組成重要項目", "year": 111, "ans": "A", "id": "111-37"}, {"num": 38, "q": "有關我國社區老人健康促進之敘述，下列何者錯誤？", "A": "公共衛生進步導致高齡化社會的來臨", "B": "促進老人健康可早期預防或減少慢性病及其併發症之發生", "C": "本土化社區老人健康促進工作之推廣模式是以醫院為基礎", "D": "藉由老人間的互動可強化老人健康促進及改善日常生活行為", "year": 111, "ans": "C", "id": "111-38"}, {"num": 39, "q": "有關檳榔之敘述，下列何者錯誤？", "A": "檳榔子屬第一類致癌物", "B": "檳榔致癌部位主要在口腔、咽及食道", "C": "嚼不含任何添加物的檳榔子則不會致癌", "D": "其導致之口腔癌為臺灣男性罹患的主要癌症之一", "year": 111, "ans": "C", "id": "111-39"}, {"num": 40, "q": "有關吸菸者行為改變階段模式之敘述，下列何者錯誤？", "A": "懵懂期指未來六個月中沒有改變行動的意圖", "B": "沉思期指開始覺察到吸菸的問題，但同時有繼續吸菸以及停止吸菸的矛盾心情", "C": "決定期指意圖在未來一個月內行動，通常還未有任何改變", "D": "維持期指戒菸已超過六個月，新行為模式已較穩定", "year": 111, "ans": "C", "id": "111-40"}, {"num": 41, "q": "依據世界衛生組織(WHO)「長者整合性照護指引(integrated care for older people, ICOPE)」，希望幫助長者及早發現可能導致失能的風險因子，其六大功能指標，不包含 下列何者？", "A": "認知", "B": "營養", "C": "聽力", "D": "失禁", "year": 111, "ans": "D", "id": "111-41"}, {"num": 42, "q": "Dicenso等學者(2009)把實證醫學照護資料庫分類為6大類，常用的臨床指引屬下列何種 資料？", "A": "原始研究精要 ( synopses of studies )", "B": "研究摘要 ( summaries )", "C": "統合研究資料 ( syntheses )", "D": "統合研究精要 ( synopses of syntheses )", "year": 111, "ans": "B", "id": "111-42"}, {"num": 43, "q": "有關醫策會臺灣病人安全通報系統(Taiwan Patient-safety Reporting system,TPR)之醫療 異常事件通報作業，下列敘述何者錯誤？", "A": "通報系統的方便性及可近性是重要因素", "B": "通報系統採用具名制，以利事件分析及改善", "C": "成功醫療異常事件通報系統，是以錯誤中學習為原則", "D": "醫療異常通報是病人安全文化的營造", "year": 111, "ans": "B", "id": "111-43"}, {"num": 44, "q": "依據臨床疾病預防的說明，下列何者錯誤？", "A": "三級預防 ( tertiary prevention ) 是針對反覆再發的疾病，採取合併多種藥物治療，", "B": "次級預防 ( secondary prevention ) 是針對已罹病的病人給予治療，以防止疾病再次發生", "C": "初級預防 ( primary prevention ) 是針對已出現的疾病危險因子給予介入，以防止疾病發生，", "D": "根本預防 ( primordial prevention ) 是以根本性的方式防止疾病危險因子出現，例如減少", "year": 111, "ans": "A", "id": "111-44"}, {"num": 45, "q": "有關休克的形成原因，下列何者為引發心輸出量降低而導致之低血壓休克？", "A": "敗血症", "B": "嚴重心肌炎", "C": "燒燙傷", "D": "嚴重胰臓炎", "year": 111, "ans": "B", "id": "111-45"}, {"num": 46, "q": "有關突發性胸痛症狀與緊急處理決策的敘述，下列何者最適當？", "A": "第一考量為生命徵象是否穩定，應給予心電圖檢查", "B": "胃食道逆流的胸痛多以胸骨下的沉重感與壓痛來表現，可能會有轉移痛", "C": "主動脈剝離多以胸部正中央灼熱疼痛來表現", "D": "若因肺炎造成的胸痛，較不容易有肋膜性疼痛，且胸痛與呼吸無關", "year": 111, "ans": "A", "id": "111-46"}, {"num": 47, "q": "有關心肌炎(myocarditis)之敘述，下列何者錯誤？", "A": "接種 mRNA 疫苗，也可能引起心肌炎", "B": "心肌切片是確認診斷的方式", "C": "多數個案會有持續發高燒的情形", "D": "心電圖顯示 ST、T 波、或 Q 波等異常", "year": 111, "ans": "C", "id": "111-47"}, {"num": 48, "q": "罹患心臟病病人表示最近全身無力、胸悶及心跳變快，要坐下來休息幾分鐘之後才能起身。 睡覺時無法平躺，需要坐起來才會改善。依據紐約心臟學會(New York Heart Association, NYHA)之心衰竭功能分級，應屬於第幾級？", "A": "第 I 級", "B": "第 II 級", "C": "第 III 級", "D": "第 IV 級", "year": 111, "ans": "D", "id": "111-48"}, {"num": 49, "q": "身體檢查時發現病人恥骨上緣可以觸診到膀胱，且有壓痛，下列何者最不可能？", "A": "神經性膀胱", "B": "急迫性尿失禁", "C": "溢流性尿失禁", "D": "解尿疼痛", "year": 111, "ans": "B", "id": "111-49"}, {"num": 50, "q": "有關住院病人常見泌尿道感染之敘述，下列何者正確？", "A": "服用免疫抑制劑所產生的無症狀菌尿症，為避免抗生素副作用，不建議治療", "B": "男性因為有前列腺，較容易有泌尿道感染", "C": "男性及女性糖尿病患者皆容易併發無症狀菌尿症或泌尿道感染", "D": "頻繁性交及用殺精劑來避孕，會增加泌尿道感染的危險", "year": 111, "ans": "D", "id": "111-50"}, {"num": 51, "q": "50歲女性，從事美髮業，過去有結石的病史，健康檢查時發現有血尿情形，但無解尿困難 或疼痛。有關病人評估之敘述，下列何者正確？", "A": "如果是整段尿都是血，代表出血在下尿路", "B": "如果是解到快完時出血，有可能是膀胱出血", "C": "如果是前段尿就有血，須排除來自會陰出口的問題", "D": "無痛性血尿是慢性膀胱炎的表徵", "year": 111, "ans": "C", "id": "111-51"}, {"num": 52, "q": "68歲男性，有酗酒、高血壓及慢性肝炎病史，今日因腹痛超過一日至急診就診，身體 診察發現腹部肚臍周圍出現瘀血，有卡倫氏徵象(Cullen’s sign)，請問以下哪一個診斷 最不可能？", "A": "肝癌破裂", "B": "急性壞死性胰臟炎", "C": "腹部主動脈瘤破裂", "D": "急性腸繫膜缺血合併腸壞死破裂", "year": 111, "ans": "D", "id": "111-52"}, {"num": 53, "q": "80歲女性，糖尿病、高血壓、及腎衰竭接受長期血液透析，最近2天出現噁心、嘔吐、 腹瀉、胸悶、及呼吸困難的症狀，抵達急診時之心電圖(圖一)，下列何者為最可能的診斷？ 圖(一)", "A": "高血鉀症 ( hyperkalemia )", "B": "心內膜炎 (endocarditis )", "C": "格達氏症候群 ( Brugada syndrome )", "D": "ST 節段上升心肌梗塞 ( ST- segment elevation myocardial infarction )", "year": 111, "ans": "A", "id": "111-53"}, {"num": 54, "q": "60歲高血壓男性，未規則服藥控制，長期抽菸每天約半包。出現胸悶、冒冷汗、頭暈、 及呼吸困難的症狀約一個半小時，抵達急診時之心電圖(圖二)，下列敘述何者錯誤？ 圖(二)", "A": "導極 II、III、aVF 出現 ST 段上升", "B": "導極 V 4 ~ V 6 出現 ST 段上升", "C": "QRS 變寬且合併左側束支傳導阻滯 ( left bundle branch block, LBBB )", "D": "P 波與 QRS 相對關係不規則，疑似出現完全性房室傳導阻滯 ( complete AV block )", "year": 111, "ans": "C", "id": "111-54"}, {"num": 55, "q": "有關心包膜炎(acute pericarditis)心電圖可能出現的變化，下列何者錯誤？", "A": "出現 S", "B": "PR 段 ( PR segment ) 下降", "C": "交替波 ( electrical alternans )", "D": "除 aVR 以外的瀰漫性 ST 段 ( ST-segment ) 上升", "year": 111, "ans": "A", "id": "111-55"}, {"num": 56, "q": "31歲女性，出現漸進式頭痛及發燒懷疑腦膜炎。周邊血液全血球計數白血球為5520/μL (neutrophil79.9%)；腦脊髓液檢查結果：腦壓為380 mmH O(正常值65-795mmH O)， 2 2 RBC 125/μL，WBC 27/μL(L/N=19/8)，total protein 98.4mg/dL(正常值18~45mg/dL)， glucose 13mg/dL；周邊血液血糖值128mg/dL；口腔有念珠菌感染。就前述結果，下列 哪一種診斷最有可能？", "A": "病毒性腦膜炎 ( viral meningitis )", "B": "隱球菌腦膜炎 ( cryptococcal meningitis )", "C": "流行性腦脊髓膜炎 ( meningococcal meningitis )", "D": "克列白氏菌腦膜炎 ( klebsiella pneumoniae meningitis )", "year": 111, "ans": "B", "id": "111-56"}, {"num": 57, "q": "新冠肺炎的抗原快篩試劑仿單說明該試劑之敏感性(sensitivity)為85%，專一性 (specificity)為99%。有關此抗原快篩試劑臨床應用之敘述，下列何者錯誤？", "A": "臨床實際的檢驗結果，會受到採檢部位、採檢者技術、以及檢體處理過程的影響", "B": "99 % 專一性，代表 100 位沒有感染新冠肺炎的受測者，有 1 位會被這個試劑檢測為陽性", "C": "85 % 敏感性，代表 100 位真正感染新冠肺炎的受測者，有 85 位可以經由這個試劑檢測", "D": "若社區新冠感染的盛行率愈高，則這個檢驗試劑的陽性預測值 ( positive predictive", "year": 111, "ans": "D", "id": "111-57"}, {"num": 58, "q": "急性骨髓性白血病人，周邊血液白血球數為326.8K/μL(blast 98%)，住院後接受高劑量 化學治療，主治醫師交代要預防腫瘤溶解症候群(tumor lysis syndrome,TLS)相關的併發 症，在安排血液追蹤檢驗時，下列哪一個項目最不需要？", "A": "尿酸 ( uric acid )", "B": "肌酐酸 ( creatinine )", "C": "鉀離子 ( potassium )", "D": "丙胺酸轉胺酶 ( alanine aminotransferase , ALT )", "year": 111, "ans": "D", "id": "111-58"}, {"num": 59, "q": "D-雙合試驗(D-dimer)檢驗值在下列疾病中，何者最不可能升高？", "A": "肺栓塞 ( pulmonary embolism )", "B": "HELLP 症候群 ( HELLP syndrome )", "C": "急性缺血性腦中風 ( acute ischemic stroke )", "D": "瀰漫性血管內凝血 ( disseminated intravascular coagulation )", "year": 111, "ans": "C", "id": "111-59"}, {"num": 60, "q": "有關腹部檢查進行輕觸診(light palpation)的敘述，下列何者錯誤？", "A": "必須在執行叩診 ( percussion ) 之前檢查", "B": "對主訴腹痛的病人其疼痛部位應最後檢查", "C": "以手掌平置腹壁以指腹輕按來掃描腹壁各部位進行檢查", "D": "目的為識別壓痛、肌肉保護性痙攣 ( muscle guarding ) 及表淺病灶", "year": 111, "ans": "A", "id": "111-60"}, {"num": 61, "q": "病人同時有脾臟腫大及腹壁表淺靜脈曲張，且呈現自肚臍向外散出分佈(caput edusae)， 從這兩種徵象判斷，下列何者為最可能的原因？", "A": "急性肝衰竭", "B": "肝門靜脈高壓", "C": "白血病", "D": "下腔大靜脈栓塞", "year": 111, "ans": "B", "id": "111-61"}, {"num": 62, "q": "有關肝硬化之敘述，下列何者最能代表病人已有肝功能代償不全的狀態？", "A": "脾腫大", "B": "食道靜脈曲張", "C": "黃疸", "D": "低血壓", "year": 111, "ans": "C", "id": "111-62"}, {"num": 63, "q": "病人出現黃疸但小便顏色正常，尿液檢查bilirubin陰性，下列何者為最可能的診斷？", "A": "嚴重溶血", "B": "急性肝衰竭", "C": "總膽管癌", "D": "藥物性肝炎", "year": 111, "ans": "A", "id": "111-63"}, {"num": 64, "q": "病人右下腹疼痛，懷疑為急性闌尾炎，有關腰大肌徵象(psoas sign)之敘述，下列何者 正確？", "A": "檢查時病人需將髖關節及膝關節彎曲 90 度", "B": "檢查時腹痛加劇表示發炎的闌尾刺激腰大肌", "C": "若檢查此徵象為陽性表示闌尾位於盲腸前方", "D": "若檢查此徵象為陰性則可排除急性闌尾炎", "year": 111, "ans": "B", "id": "111-64"}, {"num": 65, "q": "70 歲病人，最近兩週全身虛弱、胸部不適、呼吸困難，因而入院治療。身體檢查時兩側 呼吸音正常，肺部扣診呈兩側反響音；但心音微弱，頸靜脈怒張；心跳 110/min，血壓 80/50mmHg，心電圖呈現低電壓(low voltage)與電氣交替現象(electrical alternans)。 下列何者為最可能之診斷？", "A": "心包膜填塞 ( cardiac temponade )", "B": "肺動脈栓塞 ( pulmonary embolism )", "C": "張力性氣胸 ( tension pneumothorax )", "D": "鬱血性心衰竭 ( congestive heart failure )", "year": 111, "ans": "A", "id": "111-65"}, {"num": 66, "q": "下列何者為原發性腎上腺功能不全(primary adrenal insufficiency)的特徵？", "A": "低血鉀", "B": "高血鈉", "C": "皮膚色素沈積", "D": "低的 ACTH level", "year": 111, "ans": "C", "id": "111-66"}, {"num": 67, "q": "60歲男性，身高170公分，體重80公斤，腰圍110公分。血壓135/90mmHg。 抽血空腹血糖80mg/dL,HDL: 50mg/dL,TG: 170mg/dL。依據國民健康署所訂指標， 其符合代謝症候群幾項判定標準？", "A": "3 項", "B": "2 項", "C": "1 項", "D": "4 項", "year": 111, "ans": "A", "id": "111-67"}, {"num": 68, "q": "58歲男性，因呼吸喘前來求診。病人吐氣費力，兩側呼吸音有喘鳴聲(wheezing)。其 動脈血氧呈現pH：7.25，PaO : 90mmHg，PaCO ：82mmHg，HCO -：32mEq/L。 2 2 3 有關此病人血中酸鹼平衡之判斷，下列何者正確？", "A": "代謝性鹼血症，沒有呼吸性代償", "B": "呼吸性酸血症，同時有代謝性代償", "C": "代謝性酸血症，同時有呼吸性代償", "D": "呼吸性鹼血症，同時有代謝性代償", "year": 111, "ans": "B", "id": "111-68"}, {"num": 69, "q": "有關溢流性尿失禁之敘述，下列何者錯誤？", "A": "可能成因為膀胱出口阻塞，如良性前列腺增生", "B": "逼尿肌過度收縮亦是可能成因", "C": "其排尿特徵為量少且頻繁", "D": "排尿後之餘尿量一般會大於 200 - 300 ml", "year": 111, "ans": "B", "id": "111-69"}, {"num": 70, "q": "有關上運動神經元疾患(upper motor neuron disease)之敘述，下列何者正確？", "A": "肌肉張力下降，呈現軟弱無力情形", "B": "通常不會造成感覺異常", "C": "深部肌腱反射增強，但無 Babinski sign", "D": "腦幹以下位置受損，通常造成同側之動作異常", "year": 111, "ans": "BD", "id": "111-70"}, {"num": 71, "q": "68歲男性，門診時抱怨這一兩年右手出現震顫 (tremor ) 的狀況，保持同一個姿勢久了 或者是壓力比較大時，症狀會更嚴重，但是喝一點酒反而狀況會比較改善。病人沒有 運動遲緩或肢體僵硬現象，但是家族長輩也有類似的病徵。下列何種診斷最為可能？", "A": "帕金森氏症 ( Parkinson ’ s disease )", "B": "原發性震顫 ( essential tremor )", "C": "杭亭頓症 ( Huntington ’ s disease )", "D": "酒精戒斷現象 ( alcohol withdrawal )", "year": 111, "ans": "B", "id": "111-71"}, {"num": 72, "q": "有關僵直性脊椎炎(ankylosing spondylitis)的敘述，下列何者錯誤？", "A": "阿基里斯腱與跟骨接觸處常會發炎 ( enthesitis )", "B": "屬於血清陰性脊椎關節病變 ( seronegative spondyloarthropathy ) 的一種", "C": "類風濕因子 ( rheumatoid factor ) 通常為陽性", "D": "常有虹膜炎 ( uveitis ) 病史", "year": 111, "ans": "C", "id": "111-72"}, {"num": 73, "q": "有關纖維肌痛症候群(fibromyalgia)的敘述，下列何者正確？", "A": "壓力、創傷或暴露於低溫環境中，易使病情惡化", "B": "常會伴隨關節發炎與皮膚紅斑之出現", "C": "通常會與患者的飲酒過量行為相關", "D": "老年女性是最常見的好發族群", "year": 111, "ans": "A", "id": "111-73"}, {"num": 74, "q": "坐骨神經痛之臨床症狀，下列何者錯誤？", "A": "下肢麻痺或無力感", "B": "膝蓋以上抽痛", "C": "可能伴隨下背痛", "D": "彎腰或咳嗽時會使疼痛加劇", "year": 111, "ans": "B", "id": "111-74"}, {"num": 75, "q": "有關譫妄(delirium)之敘述，下列何者錯誤？", "A": "是多種原因所引起", "B": "是急性混亂的狀態", "C": "建議使用評估表評估譫妄", "D": "晚上譫妄會改善", "year": 111, "ans": "D", "id": "111-75"}, {"num": 76, "q": "在所有年齡層及性別中最常見之腹股溝上疝氣(hernia in the groin)，下列敘述何者錯誤？", "A": "屬於間接鼠蹊疝氣 ( inguinal hernia )", "B": "檢查者的手指在患者用力時置於股管，疝氣下降至股管，可由指尖觸碰到", "C": "若發生於男性，路徑常進入陰囊", "D": "稱為股疝氣，好發於男性", "year": 111, "ans": "D", "id": "111-76"}, {"num": 77, "q": "有關女性骨盆腔檢查技巧之敘述，下列何者錯誤？", "A": "進行每個步驟前先向病人說明", "B": "不能將兩膝間覆蓋的布壓低", "C": "避免非預期或突然的動作", "D": "觀察病人臉部表情是否有不適", "year": 111, "ans": "B", "id": "111-77"}, {"num": 78, "q": "病人主述心悸，心電圖呈現心室上頻脈 ( supraventricular tachycardia ) ，當合併下列 哪一狀況時，為進行心律整流(cardioversion)的適應症？", "A": "心律 180 / min", "B": "收縮血壓 180 mmHg", "C": "意識改變", "D": "皮膚潮紅冒汗", "year": 111, "ans": "C", "id": "111-78"}, {"num": 79, "q": "依據「專科護理師於醫師監督下執行醫療業務辦法」，有關專師及訓練專師於醫師監督下 得執行之醫療業務，下列何者錯誤？", "A": "子宮頸抹片採檢", "B": "氣管內管插管", "C": "胃造廔管拔除", "D": "心臟整流術", "year": 111, "ans": "B", "id": "111-79"}, {"num": 80, "q": "有關自主性專科護理師業務之敘述，下列何者錯誤？", "A": "詳實記載病人的病歷紀錄", "B": "疾病及健康促進的諮詢", "C": "表層傷口的縫合", "D": "參與機構照護成效評估", "year": 111, "ans": "C", "id": "111-80"}, {"num": 1, "q": "世界衛生組織 ( World Health Organization , WHO ) 在 2010 年提出「跨團隊合作照護 (interprofessional collaborative practice,IPCP)」的概念，透過跨專業領域者組成照護團隊， 提供個別化、連續性的照護服務，以提高照護品質。下列何者不是促進跨團隊合作必要的 做法？", "A": "成員可以包括醫療與非醫療人員", "B": "必須有共同的目標", "C": "團隊的領導者必須是醫師", "D": "應有開放的溝通環境", "year": 112, "ans": "C", "id": "112-1"}, {"num": 2, "q": "有關臨床照護指引(clinical practice guidelines,CPG)，下列敘述何者最不適當？", "A": "以治療效益為優先考量，其次再考慮成本", "B": "可標準化診療流程，減少變異性以及誤診的產生", "C": "以臨床照護經驗為基礎發展出來的醫療建議", "D": "以系統性文獻回顧與評讀，發展出目前最佳照護建議", "year": 112, "ans": "C", "id": "112-2"}, {"num": 3, "q": "根據民國111年6月22日公布之「醫療事故預防及爭議處理法」，醫療機構應於醫療事故發生之 翌日起多少個工作日內，向病人、家屬或其代理人說明、溝通，並提供協助及關懷服務？", "A": "三個工作日", "B": "五個工作日", "C": "七個工作日", "D": "十個工作日", "year": 112, "ans": "B", "id": "112-3"}, {"num": 4, "q": "與病人溝通的過程中，具體表達請求有助於發現彼此的需求，並同理對方。下列何者為 最「具體」表達請求的說法？", "A": "我希望你每天可以下床走動 2 次", "B": "出院後你要多休息，不要太緊張要放輕鬆", "C": "我希望你能吃的營養一點", "D": "我希望你下次來看門診時能更有精神", "year": 112, "ans": "A", "id": "112-4"}, {"num": 5, "q": "根據衛生福利部「長期照顧服務申請及給付辦法」之規定，因身心失能，且符合下列資格之一 者，得向長期照顧管理中心或直轄市、縣(市)主管機關申請長期照顧服務，下列何者錯誤？", "A": "50 歲以上原住民", "B": "65 歲以上老人", "C": "領有身心障礙證明者", "D": "55 歲以上失智症者", "year": 112, "ans": "A", "id": "112-5"}, {"num": 6, "q": "66歲王先生，急性腦中風後家屬想了解其失能程度，及有關「全民健康保險急性後期整合 照護計畫」中對於腦中風急性後期照護模式與規範，下列敘述何者錯誤？", "A": "收案對象為急性腦中風發作滿 3 個月，且病況穩定之病人", "B": "急性腦中風後治療的黃金期，復健成效最好的時間是發病後 3 - 6 個月", "C": "轉到急性後期照護醫院，可以讓失能狀況改善，再住院率與一年內死亡率下降", "D": "急性後期照護團隊，依病人評估結果安排適當之急性後期整合照護模式", "year": 112, "ans": "A", "id": "112-6"}, {"num": 7, "q": "專科護理師教導學妹手術的照護方式，下列教學方式何者最具學習保留效果？", "A": "學妹回示教及實作", "B": "看視訊及討論", "C": "聽講解及看示意圖", "D": "看技術影片及討論", "year": 112, "ans": "A", "id": "112-7"}, {"num": 8, "q": "專科護理師發現病人若有所思地站在窗邊，上前詢問：「早安，我看到你站在這一陣子 了，在想什麼呢？」以上是使用何種治療性溝通技巧？", "A": "拓寬話題", "B": "給予認知", "C": "表達同理", "D": "集中焦點", "year": 112, "ans": "A", "id": "112-8"}, {"num": 9, "q": "專科護理師為維護照護品質，進行輸血錯誤的根本原因分析(root cause analysis)，應用反應 性屏障分析法(reactive barrier analysis)分析錯誤原因，發現為血袋編號貼紙材質容易脫落 導致沾黏，此為何種屏障類型？", "A": "人為屏障", "B": "行政屏障", "C": "物理屏障", "D": "天然屏障", "year": 112, "ans": "C", "id": "112-9"}, {"num": 10, "q": "專科護理師運用SPIKES溝通模式(The six steps of SPIKES)，向癌症病人進行病情告知 時，詢問病人「關於你的疾病，你想要知道哪些訊息？」屬於何項技巧？", "A": "評估感受 ( assessing the patient ' s Perception )", "B": "病人邀請 ( obtaining the patient ' s Invitation )", "C": "提供訊息 ( giving Knowledge and information )", "D": "同理感受 ( addressing the patient ' s Emotions with empathic response )", "year": 112, "ans": "B", "id": "112-10"}, {"num": 11, "q": "面對病人對治療計畫產生疑慮時，專科護理師應如何發揮協調與溝通的角色？", "A": "強調疾病的嚴重性，讓病人依計畫完成治療", "B": "尊重病人選擇，勿因強迫而造成醫療糾紛", "C": "鼓勵病人對治療抱持樂觀，積極地接受治療", "D": "傾聽及了解病人對治療計畫的疑慮，再給予說明", "year": 112, "ans": "D", "id": "112-11"}, {"num": 12, "q": "醫師緊急放置氣管內管過程中，主責護理師發現血氧飽和度有下降的趨勢，大聲說出： 「血氧飽和度偏低，需要先給氧」，醫師專注於手頭工作，未有反應。專科護理師接續 說：「對！血氧飽和度下降至94％，我們需要先提供氧氣！」以上行動是運用團隊資源 管理的何項概念？", "A": "重申關切 ( two - challenge rule )", "B": "相互監測 ( cross monitoring )", "C": "事前說明 ( brief )", "D": "重複確認 ( check back )", "year": 112, "ans": "A", "id": "112-12"}, {"num": 13, "q": "專科護理師發現病人傷口紅腫，以SBAR技巧向醫師說明病況：「病人生命徵象正常， 傷口疼痛指數3分，沒有出血、分泌物和特殊氣味」，此為何種類型的資訊傳遞？", "A": "Situation", "B": "Background", "C": "Assessment", "D": "Recommemdation", "year": 112, "ans": "C", "id": "112-13"}, {"num": 14, "q": "專科護理師於腹膜透析管路照護課程中，邀請腹膜透析治療3年的病友分享照護經驗， 依據ARCS理論此為運用何項動機技巧？", "A": "切身相關 ( relevance )", "B": "引起注意 ( attention )", "C": "建立信心 ( confidence )", "D": "感到滿足 ( satisfaction )", "year": 112, "ans": "A", "id": "112-14"}, {"num": 15, "q": "專科護理師給予病人低血糖衛教，學習目標是「可說出三項低血糖的徵象」，此為哪一個 層次的學習目標？", "A": "認知", "B": "情意", "C": "技能", "D": "應用", "year": 112, "ans": "A", "id": "112-15"}, {"num": 16, "q": "有關專科護理師在臨床照護團隊所展現的合作協調能力，下列敘述何者錯誤？", "A": "僅需與主責醫師做好密切合作溝通", "B": "所展現的合作能力會反應於病人照護滿意度", "C": "溝通能力是跨領域團隊照護之核心能力之一", "D": "運用的協調能力可減少重複性工作", "year": 112, "ans": "A", "id": "112-16"}, {"num": 17, "q": "45歲李女士，因子宮肌瘤大出血，由家人送到急診，當時意識清楚但血壓有持續下降現象， 醫師建議輸血，但李太太拒絕輸血，經醫護人員及家人不斷勸導仍不同意輸血，過程中 其血壓持續下降，脈搏快而弱，呼吸急促，且意識不清。醫師在李太太心智狀態已不合適 做決定的情形下，知會家人後為其輸血。請問醫師所秉持的生物醫學倫理原則為何者？", "A": "保護原則", "B": "自主原則", "C": "不傷害原則", "D": "正義原則", "year": 112, "ans": "C", "id": "112-17"}, {"num": 18, "q": "50歲陳女士，目前昏迷住加護病房，家屬帶來草藥粉並要求護理人員為病人灌食，醫師 要求家屬寫切結書：「藥物灌入後發生任何病情變化需自行負責」，此時專科護理師 最好的處理方式為何？", "A": "了解藥物的作用，依家屬要求執行給藥", "B": "請家屬自行負責及自行給藥", "C": "協助醫師一定要讓家屬填好切結書", "D": "與醫師及家屬召開會議，討論此議題", "year": 112, "ans": "D", "id": "112-18"}, {"num": 19, "q": "依據「病人自主權利法」，病人符合下列臨床條件之一，且有預立醫療決定者，醫療機構 或醫師得依其預立醫療決定終止、撤除或不施行維持生命治療或人工營養及流體餵養 之全部或一部，以下何者錯誤？", "A": "處於不可逆轉之昏迷狀況", "B": "極重度失智", "C": "永久植物人狀態", "D": "無法治癒的罕見疾病", "year": 112, "ans": "D", "id": "112-19"}, {"num": 20, "q": "病人不滿出院手續繁雜，於專科護理師用餐時，至休息室大聲說：「你是笨蛋嗎？真的 是廢物一個！」專科護理師起身安撫病人情緒，遭病人揮手推撞至桌角導致瘀傷，同事 通知警衛制止。有關病人行為之敘述，下列何者正確？", "A": "得以醫療法之公然侮辱，妨礙醫療業務執行認之", "B": "休息室不屬公共場所，不能以公然侮辱認之，但構成傷害之要件", "C": "得以刑法之公然侮辱罪和傷害罪認之", "D": "公然侮辱和傷害為非告訴乃論，警察機關應主動將病人檢送偵辦", "year": 112, "ans": "C", "id": "112-20"}, {"num": 21, "q": "關於專科護理師執行監督下之醫療業務範圍，下列何者錯誤？", "A": "開顱手術縫合傷口拆線", "B": "肋膜腔豬尾巴 ( pig tail ) 引流管拔除", "C": "氣切導管更換", "D": "橈動脈導管置入", "year": 112, "ans": "C", "id": "112-21"}, {"num": 22, "q": "病人40歲初次診斷末期腎臟疾病，評估符合接受腎臟移植條件。一年半前與 38歲配偶 結婚，配偶曾於26歲捐贈部分肝臟給父親，此次知悉丈夫病況，再次提出活體捐贈申請。 此時專科護理師可提供何項建議？", "A": "與受贈者結婚未滿兩年，配偶不符合捐贈條件", "B": "配偶於完成書面同意後，始可安排進入捐贈評估", "C": "受贈者於結婚後一年診斷，配偶符合捐贈條件", "D": "配偶曾捐贈部分肝臟，不符合腎臟捐贈條件", "year": 112, "ans": "C", "id": "112-22"}, {"num": 23, "q": "52歲男性診斷為舌癌第二期，接受病灶切除手術後出院。上週在家中被發現突然無呼吸 心跳，送往急診急救後恢復呼吸心跳，插管接呼吸器至加護病房治療，但目前仍未恢復 意識。家屬告訴醫師病人上次住院時已簽立拒絕維生醫療意願書，認為現在治療已經違背 病人意願，希望醫師立即拔除呼吸器讓病人好走。以下處置何者才符合「安寧緩和醫療 條例」之規定？", "A": "此治療已違背病人之意願，可以立即撤除維生醫療", "B": "因病人不符合末期之定義，無法立即撤除維生醫療", "C": "本身為癌症病人且 OHCA 未恢復意識，預後極差，以立即撤除維生醫療較適當", "D": "尚未召開家庭會議確認其他家屬之意見，無法立即撤除維生醫療", "year": 112, "ans": "B", "id": "112-23"}, {"num": 24, "q": "根據民國112年3月22日修訂之「菸害防制法」規定，下列敘述何者正確？", "A": "全面禁止電子煙之製造、輸入、販賣、供應、展示、廣告及使用，但加熱菸並未在此", "B": "可於老人福利機構所在之室外場所吸菸", "C": "父母、監護人或其他實際為照顧之人，應禁止未成年人吸菸", "D": "菸品不得有促銷或廣告，但贊助公益活動之露出不在此限", "year": 112, "ans": "C", "id": "112-24"}, {"num": 25, "q": "根據醫療機構已核定之相關預立醫療流程規範，下列何者不屬於專科護理師可代為開立 之表單？", "A": "入院許可單", "B": "放置留置導尿管之處置醫矚", "C": "死亡證明書", "D": "檢驗醫囑 ( 包含實驗室及影像 )", "year": 112, "ans": "C", "id": "112-25"}, {"num": 26, "q": "專科護理師執行監督下之醫療業務，得由醫師預立特定醫療流程，下列敘述何者正確？", "A": "執行監督醫師僅以主責主治醫師為限", "B": "醫療機構若要由專科護理師代為開立表單，需先預立特定醫療流程表單項目且核定之", "C": "專科護理師所完成的病歷紀錄，監督醫師應於 48 小時內完成病歷簽核", "D": "專科護理師執行醫療業務前，須接受特定訓練與考核，該特定訓練內容，由專科護理", "year": 112, "ans": "B", "id": "112-26"}, {"num": 27, "q": "依照專科護理師於醫師監督下執行醫療業務辦法，醫療機構以專師及訓練專師執行監督 下之業務者，需成立專科護理師作業小組，下列何者錯誤？", "A": "僅需核備預立特定醫療流程內容，無需訂定預立醫療流程標準作業程序", "B": "制定專師及訓練專師執行監督下醫療業務之標準作業程序，依照醫療機構定期審視修改", "C": "以副院長以上人員擔任召集人", "D": "醫療及護理部門主管擔任副召集人", "year": 112, "ans": "A", "id": "112-27"}, {"num": 28, "q": "一位47歲乳房X光攝影篩檢結果為陰性之女性，詢問多久可以免費做一次乳房X光攝影 檢查，依據政府補助癌症篩檢政策，你的建議是？", "A": "每 2 年 1 次，直到 69 歲", "B": "每 2 年 1 次，60 歲以後每年 1 次", "C": "每 3 年 1 次，直到 69 歲", "D": "每 3 年 1 次，60 歲以後每年 1 次", "year": 112, "ans": "A", "id": "112-28"}, {"num": 29, "q": "有關維生素D的攝取，以下敘述何者較為適當？", "A": "病人只要多出去曬太陽即可以改善維生素 D 缺乏的問題", "B": "維生素 D 是在肝臟代謝為 25 - hydroxyvitamin D ( 25 [ OH ] D )", "C": "攝取維生素 D 2 的補充比 D 3 更能有效提升血清 25 [ OH ] D 值", "D": "同時給予維生素 D 和鈣質的補充並不會增加腎結石的風險", "year": 112, "ans": "B", "id": "112-29"}, {"num": 30, "q": "有關女性定期抹片檢查的建議，下列何者正確？", "A": "沒有性生活的年長者不需定期做抹片檢查", "B": "曾患有子宮頸惡性腫瘤且已切除子宮頸者不需定期做抹片檢查", "C": "21 歲以下未曾性行為者不需定期做抹片檢查", "D": "已經完整接種 HPV 疫苗者不需定期做抹片檢查", "year": 112, "ans": "C", "id": "112-30"}, {"num": 31, "q": "一位女性受檢者乳房攝影有異常的發現，文獻上已知女性得到乳癌的基礎風險(baseline risk) 是1％，乳房攝影的敏感度(sensitivity)是90％，特異性(specificity)是91％，根據乳癌發 生率及乳房攝影的結果，其得到乳癌的機率約為？", "A": "1 ％", "B": "9 ％", "C": "30 ％", "D": "90 ％", "year": 112, "ans": "B", "id": "112-31"}, {"num": 32, "q": "目前國民健康署提供二代戒菸服務之藥物治療建議使用者，下列何者不適當？", "A": "須年滿 18 歲", "B": "尼古丁成癮度測試 ( FTND ) 得分達 4 分或以上", "C": "孕婦、哺乳者", "D": "平均 1 天吸 10 支菸或以上", "year": 112, "ans": "C", "id": "112-32"}, {"num": 33, "q": "根據「醫院緊急災害應變措施及檢查辦法」，為因應緊急災害事件，醫院應設置緊急災害 應變組織與指揮架構，依據實際需要分設各組。有關所應執行事項之敘述，下列何者錯誤？", "A": "避難管理", "B": "參謀分析", "C": "醫療作業", "D": "財務及行政", "year": 112, "ans": "A", "id": "112-33"}, {"num": 34, "q": "根據亞洲肌少症工作小組(Asian Working Group for Sarcopenia, AWGS)在2019年發表之共識 更新版，有關肌少症診斷標準，下列敘述何者錯誤？", "A": "小腿圍、SARC – F或 SARC - CalF 問卷為目標常用的篩檢工具", "B": "肌少症嚴重度分級目前分為：可能肌少症、肌少症、嚴重肌少症三級", "C": "SARC - F 是以病人的主觀評量，包含力量、行走、起身、登階、跌倒五個項目", "D": "女性小腿圍小於 33 cm，男性小於 36 cm，即代表身體肌肉量不足", "year": 112, "ans": "D", "id": "112-34"}, {"num": 35, "q": "依據2022年臺灣高風險病人血脂異常臨床治療指引，對於低密度脂蛋白膽固醇(LDL-C) 之測量結果與處置，下列建議何者不適當？", "A": "冠心症、暫時性腦缺血合併有腦 ( 頸 ) 動脈狹窄者，建議控制 LDL - C 至 70 mg / dL 以下", "B": "冠心症合併周邊動脈阻塞性疾病時，建議控制 LDL - C 至 55 mg / dL 以下", "C": "無心血管疾病且具兩個以下危險因子，LDL - C 若超過 130 mg / dL，應開始藥物控制", "D": "高風險冠狀動脈疾病者 ( 12 個月內曾心肌梗塞 ) ，建議控制 LDL - C 至 55 mg / dL 以下", "year": 112, "ans": "C", "id": "112-35"}, {"num": 36, "q": "依據109年疾病管制署國家預防接種政策對於65歲以上長者之疫苗接種建議，下列何者 較不適當？", "A": "間隔適當時間，至少各接種 1 劑 PPV 23 與 PCV 13 肺炎鏈球菌疫苗", "B": "每 10 年追加一劑破傷風、減量白喉混合疫苗 ( Td )", "C": "無帶狀疱疹病史者，毋需接種帶狀疱疹疫苗", "D": "每年接種一劑流感疫苗", "year": 112, "ans": "C", "id": "112-36"}, {"num": 37, "q": "有關跌倒篩檢之評估項目，下列何者最能預測老人日後跌倒之機率？", "A": "坐姿起立時是否需要用手幫忙撐住", "B": "過去一年是否曾經跌倒過", "C": "在家走路時是否需要扶著家具來維持平衡", "D": "是否有吃安眠藥或讓心情比較好的藥", "year": 112, "ans": "B", "id": "112-37"}, {"num": 38, "q": "下列何者為「111-112年度【醫院版】醫療品質及病人安全工作目標」新增之目標？", "A": "提升手術安全", "B": "維護孕產兒安全", "C": "落實感染管制", "D": "提升管路安全", "year": 112, "ans": "B", "id": "112-38"}, {"num": 39, "q": "為提供安全的醫療環境，預防病人跌倒及降低傷害程度，下列何者不適當？", "A": "將病人可能使用的物品，如：輔具、眼鏡等，置於病人隨手可得之處", "B": "下床時可提供家屬使用移位固定帶", "C": "浴廁加裝止滑設施、扶手及叫人鈴", "D": "移動時使用可滑動的輔具，如：移動式點滴架，以便於病人行走", "year": 112, "ans": "D", "id": "112-39"}, {"num": 40, "q": "有關執行正確手部衛生方式之敘述，下列何者正確？", "A": "執行醫療作業時，若沒有明顯髒污可以酒精性乾洗手維護手部衛生", "B": "當手上有傷口或明顯髒污時，建議先以乾洗手清潔，無法清潔再濕洗手", "C": "對於產孢菌、無套膜的病毒等，酒精性乾洗手效果較差，應以濕洗手後再乾洗手為宜", "D": "戴手套可取代洗手，但移除手套後仍建議進行手部衛生", "year": 112, "ans": "A", "id": "112-40"}, {"num": 41, "q": "依據民國97年發布之「緊急傷病患轉診實施辦法」，下列敘述何者正確？", "A": "後送醫院於傷病患緊急情事消失後，可不經傷病患本人或其親屬同意，協助其轉回原", "B": "醫院辦理轉診，應先聯繫後送醫院，後送醫院不得拒絕接受其轉診", "C": "醫院辦理轉診，應將其原因與風險告知傷病患本人或其親屬，並記載於病歷。傷病患", "D": "醫院辦理傷病患本人要求轉診時，應由病患自行指定救護運輸工具、救護人員，醫院", "year": 112, "ans": "B", "id": "112-41"}, {"num": 42, "q": "有關「重度級急救責任醫院」須「可於假日及夜間提供緊急外傷手術及緊急血管攝影栓塞」， 其法源依據為？", "A": "全民健康保險法", "B": "緊急醫療救護法", "C": "醫療法", "D": "緊急醫療救護法施行細則", "year": 112, "ans": "B", "id": "112-42"}, {"num": 43, "q": "發生醫療場所暴力事件時，依「醫院發生滋擾醫療秩序或妨礙醫療業務執行案件通報與 處置標準流程」規定，應通報下列何者單位？", "A": "衛生局", "B": "地檢署", "C": "醫策會", "D": "衛生福利部", "year": 112, "ans": "A", "id": "112-43"}, {"num": 44, "q": "有關實證健康照護五大步驟(5A)之敘述，下列何者錯誤？", "A": "第一個 A ( ask ) ：形成臨床問題", "B": "第二個 A ( acquire ) ：利用查詢文獻資料，直到找到最佳證據，以回答臨床問題", "C": "第三個 A ( appraise ) ：評讀實證文獻的效度及可用性", "D": "第五個 A ( apply ) ：將經過驗證的實證文獻結果應用於臨床", "year": 112, "ans": "D", "id": "112-44"}, {"num": 45, "q": "有關「以病人為中心」的全面品質管理(total quality management,TQM)，下列敘述何者 錯誤？", "A": "若要降低血流感染率，可使用柏拉圖了解問題主因，將累積至 80 ％ 主要因素進行分析", "B": "經過品管團隊進行問題的確立或分析、方案決策，可以流程圖將想法步驟流程化", "C": "進行品質改善的問題原因分析階段，可以直方圖、散布圖、魚骨圖等收集量性數據", "D": "查核表是利用簡單數據或圖示，針對特定事件的發生次數或頻率，進行資料記錄", "year": 112, "ans": "C", "id": "112-45"}, {"num": 46, "q": "關於專科護理師從事醫療照護的業務，下列敘述何者錯誤？", "A": "執業時需做執業登錄", "B": "依照規定須完成繼續教育積分，並證照更新", "C": "因業務而取得的他人秘密，不得無故洩漏，確保病人隱私權", "D": "執行業務所製作之病歷紀錄，依照醫療法規定應保存 7 年", "year": 112, "ans": "送分", "id": "112-46"}, {"num": 47, "q": "75歲男性病人已有10年慢性阻塞性肺疾病(COPD)病史，下列何者為其身體診察最可能 之發現？", "A": "不平衡的胸部擴張", "B": "觸覺震顫 ( tactile fremitus ) 增加", "C": "頸部肌肉和斜方肌萎縮", "D": "胸部前後徑對橫徑的比例約 1： 1", "year": 112, "ans": "D", "id": "112-47"}, {"num": 48, "q": "聽診成人呼吸音時，在背部肺下葉處聽到低頻率、輕柔的呼吸音，有關結果與判讀之敘述， 下列何者正確？", "A": "支氣管音 ( bronchial sounds ) / 正常", "B": "肺泡音 ( vesicular sounds ) / 正常", "C": "支氣管肺泡音 ( bronchovesicular sounds ) / 不正常", "D": "氣管音 ( tracheal sounds ) / 不正常", "year": 112, "ans": "B", "id": "112-48"}, {"num": 49, "q": "進行神經學檢查診察時，如果要評估顏面神經(facial nerve)功能是否完整，可以指示病人 做下列那一個動作？", "A": "咬緊牙關", "B": "伸出他的舌頭", "C": "打一個哈欠", "D": "鼓起雙頰", "year": 112, "ans": "D", "id": "112-49"}, {"num": 50, "q": "懷疑病人有腕隧道症候群(carpal tunnel syndrome)，有關Phalen's test之敘述，下列何者 正確？", "A": "請病人舉直大拇指，然後向拇指施加向下的阻力，以測試拇指外展的力量", "B": "要求病人手背靠手背維持手腕屈曲呈 90 度直角約 60 秒的時間", "C": "要求病人手掌對手掌維持手腕過度伸展約 60 秒的時間", "D": "請病人移動大拇指跨越手掌，摸到小指的基底部，然後再回到其張開的位置", "year": 112, "ans": "B", "id": "112-50"}, {"num": 51, "q": "47歲女性病人，在醫院從事看護工作，主訴下背痛，疼痛部位於背部中線腸骨脊(iliac crest) 高度，下列何者為病人下背痛位置？", "A": "T12", "B": "L2", "C": "L4", "D": "S2", "year": 112, "ans": "C", "id": "112-51"}, {"num": 52, "q": "有關老年人譫妄(delirium)的現象，下列敘述何者正確？", "A": "症狀穩定且持續", "B": "症狀慢慢發展，意識沒有改變", "C": "病人呈現多重認知上的問題和記憶力缺失", "D": "症狀突然發生而且起起伏伏", "year": 112, "ans": "D", "id": "112-52"}, {"num": 53, "q": "下列何者不是周邊動脈功能不良之典型症狀或徵象？", "A": "疼痛", "B": "水腫", "C": "顏色蒼白", "D": "溫度冰冷", "year": 112, "ans": "B", "id": "112-53"}, {"num": 54, "q": "身體診察發現病人於軀幹出現表淺靜脈血管擴張且橫跨胸腹壁，下列疾病何者最不可能 有此徵象？", "A": "慢性上腔靜脈症候群 ( superior vena cava syndrome )", "B": "慢性下腔靜脈血栓 ( inferior vena cava thrombosis )", "C": "肝臟靜脈阻塞性疾病 ( hepatic veno-occlusive disease )", "D": "上腸系膜靜脈血栓 ( superior mesenteric vein thrombosis )", "year": 112, "ans": "D", "id": "112-54"}, {"num": 55, "q": "身體診察執行聽診時，發現左下肺野出現異常摩擦音，需要考慮下列徵象及相關的診斷， 但何者最不可能？", "A": "肋膜摩擦音 ( friction rub ) / 肋膜炎 ( pleurisy )", "B": "肋膜摩擦音 ( friction rub ) / 支氣管肺炎 ( bronchopneumonia )", "C": "心包膜摩擦音 ( friction rub ) / 急性心包膜炎 ( pericarditis )", "D": "哈氏徵象 ( Hamman ' s sign) / 縱膈腔氣腫 ( pneumomediastinum )", "year": 112, "ans": "B", "id": "112-55"}, {"num": 56, "q": "67歲男性有高血壓、慢性B型肝炎病史及抽菸喝酒的習慣。早上起床時出現左上腹劇痛 合併噁心冒冷汗的症狀，身體診察發現有左邊腰側瘀青。有關腰側瘀青徵象之敘述，下列 何者正確？", "A": "又稱為 Cullen sign", "B": "代表出現後腹腔內出血", "C": "最常見於肝癌破裂的病人", "D": "常合併出現轉移性濁音 ( shifting dullness )", "year": 112, "ans": "B", "id": "112-56"}, {"num": 57, "q": "高血鉀不會出現於下列何種疾病或情況？", "A": "擠壓症候群 ( crush syndrome )", "B": "毛地黃中毒 ( digitalis intoxication )", "C": "代謝性酸血症 ( metabolic acidosis )", "D": "庫欣氏症候群 ( Cushing’s syndrome )", "year": 112, "ans": "D", "id": "112-57"}, {"num": 58, "q": "因泌尿道感染刺激膀胱及尿道後，造成解尿時不適的症狀，下列敘述何者正確？", "A": "dysuria 症狀指的是解不出來", "B": "女性會主訴尿量變多", "C": "男性會主訴骨盆底燒灼感擴散到直腸", "D": "男性主要是解尿時陰莖底部的疼痛", "year": 112, "ans": "D", "id": "112-58"}, {"num": 59, "q": "64歲女性因排尿困難與會陰部感覺有肉球至門診求助，過去並無接受過骨盆腔手術，內診 時發現陰道前壁膨出2/3的肉球，在病人腹部用力時並未看到子宮頸，下列何者為最可能 之診斷？", "A": "膀胱膨出 ( cystocele )", "B": "子宮脫垂 ( uterine prolapse )", "C": "腸膨出 ( enterocele )", "D": "直腸膨出 ( rectocele )", "year": 112, "ans": "A", "id": "112-59"}, {"num": 60, "q": "有關心臟功能之敘述，下列何者正確？", "A": "右心室功能不佳時，肺水腫為最早出現之症狀", "B": "左心室功能不佳時，下肢水腫為最早出現之症狀", "C": "左心室射出分率 ( LVEF ) 正常時，心輸出量不會受到心律不整的影響", "D": "心肌的血液灌流缺氧時，病人可能沒有胸痛症狀但以呼吸喘為表現", "year": 112, "ans": "D", "id": "112-60"}, {"num": 61, "q": "68歲男性，有冠狀動脈疾病病史，但未規則服藥。此次因咳嗽厲害與呼吸喘約1週至急診 就醫，身體診察發現呼吸30次/分 、雙下肢水腫、體溫36.9℃、胸部X光片顯示雙側肋骨 橫膈角鈍化(blunting of costophrenic angle)、血液中之白血球數值為6500/μL、分節中性球 (segment neutrophil)75％、CRP 0.5mg/L。下列敘述何者正確？", "A": "因呼吸喘、咳嗽厲害，第一優先的鑑別診斷為肺炎", "B": "肋膜腔積液之檢驗有助於鑑別診斷之分辨", "C": "因心臟疾病原已在治療中，心臟病應非本次就醫最主要原因", "D": "肋膜腔積液會導致胸腔扣診呈鼓音，且胸腔觸覺震顫會增強", "year": 112, "ans": "B", "id": "112-61"}, {"num": 62, "q": "50歲病人有高血壓及氣喘病史，此次氣喘發作合併血壓升高就醫，下列敘述何者錯誤？", "A": "呼吸音出現 wheezing，為下呼吸道部分狹窄之表現", "B": "胸腔扣診呈現過度反響音", "C": "氣管通常位於中線，未偏移", "D": "此時血壓控制以 propranolol 為首選", "year": 112, "ans": "D", "id": "112-62"}, {"num": 63, "q": "25歲女性主訴右下腹痛已3天、體溫37.8℃、有噁心感、右下腹觸診有反彈痛、血液之 白血球12000/μL、分節中性球(neutrophil)83％。相關診察與診斷過程，下列敘述何者錯誤？", "A": "闌尾炎最有可能，但要將大腸憩室炎、子宮外孕等列入鑑別診斷", "B": "Rovsing sign 為觸診左下腹部，若左下腹部有疼痛感則為陽性", "C": "Psoas sign 陽性的話，表示發炎的闌尾在 cecum 後方", "D": "McBurney point 位於肚臍與右髂前上棘連線的外側三分之一處", "year": 112, "ans": "B", "id": "112-63"}, {"num": 64, "q": "65歲大腸癌病人術後1年，主訴腹脹、腹痛、噁心、嘔吐、食慾不振約1週，下列敘述何者 正確？ ①腹部X光片可能呈現腸氣減少，表示有腸阻塞情形 ②腸阻塞可能引發感染、甚至出現敗血症 ③腸沾黏引起的腸阻塞會出現腸蠕動減緩(hypoactive)的腸音 ④身體診察可能出現蠕動波(peristaltic waves)", "A": "①③", "B": "①④", "C": "②③", "D": "②④", "year": 112, "ans": "D", "id": "112-64"}, {"num": 65, "q": "有關急性會厭炎(acute epiglottitis)，下列敘述何者較不適當？", "A": "典型的胸部 X 光影像可看到拇指徵象 ( thumb sign )", "B": "典型臨床症狀有口水外流 ( drooling ) 、吞嚥困難 ( dysphagia ) 、呼吸窘迫 ( distress )", "C": "常見致病菌包含鏈球菌 ( Streptococcus ) 及葡萄球菌 ( Staphylococcus )", "D": "藥物治療可給予經驗性抗生素與類固醇", "year": 112, "ans": "A", "id": "112-65"}, {"num": 66, "q": "40歲病人被診斷Addison's disease，下列何者較不可能為其臨床表現？", "A": "皮膚色素沈積", "B": "ACTH 血中濃度升高", "C": "高血鈉", "D": "高血鉀", "year": 112, "ans": "C", "id": "112-66"}, {"num": 67, "q": "王先生55歲，體重70㎏、腰圍110cm、身高160cm、血壓125/80mmHg、空腹血糖82mg/dL、 高密度脂蛋白膽固醇 ( HDL - C ) 62 mg/dL、三酸甘油脂(TG)185mg/dL。根據國民健康署標準， 王先生符合代謝症候群的診斷標準共有幾項？", "A": "1 項", "B": "2 項", "C": "3 項", "D": "4 項", "year": 112, "ans": "B", "id": "112-67"}, {"num": 68, "q": "28歲病人生命徵象穩定，出現呼吸急促、頭暈目眩、嘴唇及兩側指尖發麻等症狀。醫師 診視後告知其很可能為過度換氣症候群，下列何者較可能為其血氧報告？", "A": "pH 7.12，PaO", "B": "pH 7.52，PaO", "C": "pH 7.12，PaO", "D": "pH 7.52，PaO", "year": 112, "ans": "D", "id": "112-68"}, {"num": 69, "q": "58歲病人倒地無反應，上前評估後發現已無脈搏，立即進行胸外按壓，並經求救取得 去顫器後，心律如圖(一 )，接下來下列何項處置應最為優先？ 圖(一 )", "A": "施以同步整流電擊 100 焦耳", "B": "靜脈注射 epinephrine 1 mg", "C": "利用氣管內管插管建立呼吸道", "D": "施以去顫電擊 200 焦耳", "year": 112, "ans": "D", "id": "112-69"}, {"num": 70, "q": "65歲男性，因胸悶不適求診，經測量血壓70/30mmHg，並有冒冷汗的現象，心電圖監測 如圖(二)。下列何項處置較不適合此位病人？ 圖(二)", "A": "使用經皮心臟節律器 ( TCP )", "B": "胺碘酮 ( amiodarone ) 150 mg 靜脈滴注 10 分鐘", "C": "腎上腺素 ( epinephrine ) 靜脈滴注 5 μg / min", "D": "阿托品 ( atropine ) 1 mg 靜脈推注 ( IV push )", "year": 112, "ans": "B", "id": "112-70"}, {"num": 71, "q": "30歲糖尿病人，主訴漸進性呼吸急促，合併有噁心、肚子不舒服、食慾下降。身體診察 出現深而快的呼吸38次/分、心跳140次/分、體溫及血壓均正常、呼吸音兩側對稱清晰、 血糖550mg/dL且血清酮體呈陽性。下列敘述何者較不正確？", "A": "若血液中鉀離子濃度為 4.0 mEq / L，治療應同時補充鉀離子", "B": "血液的滲透壓下降至 240 mOsm / kg，因受血糖排擠所致", "C": "血液氣體分析呈現代謝性酸中毒合併呼吸代償的現象", "D": "血液中鈉離子濃度降至 122 mEq / L，可能為假性低血鈉", "year": 112, "ans": "B", "id": "112-71"}, {"num": 72, "q": "有關缺血性腦中風的急性症狀，下列何者較不常見？", "A": "單側頭痛", "B": "嘴角歪斜", "C": "單側肢體無力", "D": "講話發音不清楚", "year": 112, "ans": "A", "id": "112-72"}, {"num": 73, "q": "有關膀胱過動症(overactive bladder,OAB)之敘述，下列何者錯誤？", "A": "大部分病人會合併下腹痛之症狀", "B": "常以急尿感 ( urgency ) 為主要症狀", "C": "抗膽鹼藥物 ( anticholinergics ) 為第一線治療藥物", "D": "年紀增加，膀胱過動症之盛行率亦隨之增加", "year": 112, "ans": "A", "id": "112-73"}, {"num": 74, "q": "有關溢流性尿失禁(overflow incontinence)之敘述，下列何者錯誤？", "A": "病人常主訴解尿後仍有殘餘尿液未解乾淨", "B": "相較於急性發作，慢性病人較少出現脹痛或壓痛症狀", "C": "攝護腺肥大是造成男性溢流性尿失禁最常見原因", "D": "副交感神經阻斷劑為治療之首選藥物", "year": 112, "ans": "D", "id": "112-74"}, {"num": 75, "q": "49歲男性，健檢發現飯前血糖132mg/dL、腎絲球過濾率90mL/min/1.73m²、無蛋白尿， 其餘檢查皆正常。下列敘述何者最適當？", "A": "無慢性腎臟疾病，維持規律生活型態及避免使用腎毒性藥物即可", "B": "慢性腎臟疾病第一期，加強血糖控制與相關危險因子之衛教", "C": "慢性腎臟疾病第二期，轉由「全民健康保險慢性腎臟病品質支付服務」進行收案", "D": "慢性腎臟疾病第三期，轉診照會腎臟專科醫師", "year": 112, "ans": "A", "id": "112-75"}, {"num": 76, "q": "51歲男性，平日務農，農暇時為兼職木工師傅。主訴右手掌疼痛約3個月，休息時會較 緩解。最近木工工作較多，無法休息，疼痛症狀愈來愈嚴重。身體診察時，右手遠端指骨 關節沒有發現希伯登氏結節(Heberden's nodes)，其他指骨關節也無疼痛或腫脹，但在食指 及中指彎曲時，在手掌掌骨的區域有出現摩擦音及明顯疼痛。下列選項何者為最有可能 的診斷？", "A": "手部退化性關節炎 ( osteoarthritis )", "B": "右手掌屈指肌之腱鞘炎 ( tenosynovitis )", "C": "C 7 的神經根病變 ( radiculopathy )", "D": "右手之腕隧道症候群 ( carpal tunnel syndrome )", "year": 112, "ans": "B", "id": "112-76"}, {"num": 77, "q": "臺東縣因地處偏鄉，為臺灣地區資源相對缺乏地區，醫療專業人才同樣聘任不易。該縣 某地區醫院，到目前為止仍未成立專科護理師作業小組，依照目前規範，下列何者為該院 專科護理師可以執行之業務？", "A": "代為開立會診單", "B": "代為開立藥物處方醫囑", "C": "表淺傷口清創", "D": "拔除鼻胃管", "year": 112, "ans": "D", "id": "112-77"}, {"num": 78, "q": "依據「專科護理師於醫師監督下執行醫療業務辦法」之規定，執行預立特定醫療流程之 標準作業程序應包括下列何者？ ① 得由醫師預立特定醫療流程 ② 得由專科護理師預立特定醫療流程 ③ 經專科護理師作業小組審查及確認預立特定醫療流程內容 ④ 經科部作業小組審查及確認預立特定醫療流程內容 ⑤ 經醫療機構核定後實施 ⑥經科部核定後實施", "A": "①②③", "B": "①③⑤", "C": "②④⑥", "D": "④⑤⑥", "year": 112, "ans": "B", "id": "112-78"}, {"num": 79, "q": "病人因車禍送至急診，血壓偏低、心跳較快、意識不清，請問下列處置何者優先順序 較不急迫？", "A": "執行腦部電腦斷層", "B": "暢通呼吸道", "C": "注意呼吸與換氣功能", "D": "穩定血壓", "year": 112, "ans": "A", "id": "112-79"}, {"num": 80, "q": "30 歲女性病人有心臟瓣膜疾病史，近來總是覺得疲累、夜間會突然醒來且心跳加速。 於心尖處聽診到一個柔軟、高頻率的收縮期心雜音，下列何者為最可能之診斷？", "A": "主動脈瓣逆流 ( aortic regurgitation )", "B": "主動脈瓣狹窄 ( aortic stenosis )", "C": "二尖瓣逆流 ( mitral regurgitation )", "D": "二尖瓣狹窄 ( mitral stenosis )", "year": 112, "ans": "C", "id": "112-80"}, {"num": 1, "q": "有關專科護理師照顧病人的過程，下列何者最不適合單獨執行？", "A": "擬定醫療計劃方針", "B": "維護臨床照顧品質", "C": "追蹤病人治療結果", "D": "指導護理師照護技巧", "year": 113, "ans": "A", "id": "113-1"}, {"num": 2, "q": "專科護理師要將實證的知識轉譯於臨床實務，以提供具有效率和效益的照護措施，下列 何者最適合做為首要步驟？", "A": "接受它 ( accept )", "B": "認同感 ( agree )", "C": "注意到 ( aware )", "D": "有能力做 ( able )", "year": 113, "ans": "C", "id": "113-2"}, {"num": 3, "q": "為病人設計衛教方案時，有關教學目標與評量的敘述，下列何者錯誤？", "A": "病人能說出兩項緩解疼痛的方法屬於認知評量", "B": "衛教前先透過測驗了解病人個別差異屬於安置性評量", "C": "針對不識字的老人了解其學習困難屬於診斷性評量", "D": "記錄教學活動中的學習歷程屬於確定性評量", "year": 113, "ans": "D", "id": "113-3"}, {"num": 4, "q": "專科護理師帶領新手專師進行職前訓練，下列作法何者最不適當？", "A": "訂定教學目標宜包括態度和技巧", "B": "先規劃好教學策略為首要準備工作", "C": "提供模擬教案練習並給予反饋", "D": "以學習者為中心依個別差異因材施教", "year": 113, "ans": "B", "id": "113-4"}, {"num": 5, "q": "下列何者不是目前臺灣專科護理師的業務範圍？", "A": "協助放射線治療病人皮膚濕性脫屑反應之敷料選擇", "B": "判讀酒精性肝炎病人住院期間之抽血數值", "C": "開立上消化道手術病人缺鐵性貧血之輸血單", "D": "執行膀胱癌術後病人之膀胱內化學藥物灌藥", "year": 113, "ans": "C", "id": "113-5"}, {"num": 6, "q": "下列何者為目前臺灣專科護理師可執行的業務範圍？", "A": "執行死亡病人之管路傷口縫合後，無須留下處置之紀錄", "B": "病人於病室往生後，可協助判定死亡及開立死亡證明書", "C": "協助開立急救藥物時，監督醫師應於2 小時內完成覆核", "D": "撰寫病程紀錄、出院摘要等醫療紀錄時仍須有醫師覆核", "year": 113, "ans": "D", "id": "113-6"}, {"num": 7, "q": "腹部惡性腫瘤病人於手術後發生複雜併發症，其家屬對於醫療團隊治療產生質疑，此時 專科護理師擬發揮溝通與協調的角色，下列敘述何者最適當？", "A": "立即澄清說明手術都有機率會造成併發症", "B": "告訴家屬醫療團隊已盡最大能力救治病人", "C": "聆聽家屬的想法與訴求並同時請法務介入", "D": "與家屬和醫療團隊成員召開家庭會議說明", "year": 113, "ans": "D", "id": "113-7"}, {"num": 8, "q": "25歲女性病人，職業為廚師，因右手腕隧道症候群接受手術，術後仍感到手腕時常痠麻 不適，出院2週至門診拆線時表達對醫師強烈不滿，此時專科護理師擬發揮溝通協調角色， 下列敘述何者最不適當？", "A": "傾聽並同理病人因手術後所導致的不適症狀", "B": "耐心地與病人解釋手術後產生併發症的可能", "C": "請病人直接和手術醫師溝通並表達不滿之處", "D": "協助病人至復健科門診進行相關的復健治療", "year": 113, "ans": "C", "id": "113-8"}, {"num": 9, "q": "81歲女性肺炎住院接受抗生素治療，因夜間失眠要求給予注射鎮靜安眠藥物，家屬希望 能依照病人要求給藥，下列敘述何者最不適當？", "A": "先進行詳細身體診察及用藥史評估", "B": "即刻照會精神科醫師協助開立藥物", "C": "評估並說明引起失眠症的可能原因", "D": "告知鎮靜藥物作用機轉及潛在風險", "year": 113, "ans": "B", "id": "113-9"}, {"num": 10, "q": "58歲病人經醫師告知為胰臟癌第三期，病人無法接受結果，要求再次解釋，身為醫療團隊 之專科護理師，下列何者為最佳之回應？", "A": "所有報告都很清楚，已經進展到胰臟癌第三期了，一定要趕快把握時間開始治療", "B": "治療的過程可能會很辛苦，我們會把症狀控制做好，一定能緩解治療的不適", "C": "我理解聽到這樣結果真的很難接受，您現在有什麼需要釐清的問題嗎", "D": "醫師已經清楚解釋了，如果您對診斷結果有疑慮，可以考慮尋求其他醫師的意見", "year": 113, "ans": "C", "id": "113-10"}, {"num": 11, "q": "75歲病人因慢性關節炎就診，在討論治療方案時，病人告知有在服用某種「袪濕補氣」 的草藥，並表示較西藥安全有效，希望能持續服用，且不想使用醫囑的消炎止痛藥。在此 情境之下，下列何者是最佳的回應方式？", "A": "了解草藥的成分和作用，同時解釋西藥的必要性，與病人討論結合兩種治療的可能性", "B": "尊重病人的選擇，同意病人繼續服用草藥，而不堅持病人必須使用西藥治療", "C": "告訴病人草藥缺乏科學依據，堅持病人必須停止使用草藥，只服用建議的西藥", "D": "建議病人去看中醫，因為處理草藥相關問題不在自己的專業範圍內", "year": 113, "ans": "A", "id": "113-11"}, {"num": 12, "q": "75 歲病人因心臟病住院，治療狀況穩定後醫師叮嚀病人應該減少肉類攝取以維持心血管 的健康，病人向您抱怨：「我們家鄉的傳統就是要吃肉，不吃肉就沒有力氣工作啊！」 下列何者最符合跨文化溝通的衛教原則？", "A": "醫師的話要聽，不然膽固醇會升高，對心臟不好", "B": "飲食均衡很重要，您應該在飲食中加入更多蔬菜", "C": "這是老一輩的觀念，還有很多高蛋白的食物也可以讓我們維持活力", "D": "我們來討論一下，如何選擇比較適合的肉類或烹調方式", "year": 113, "ans": "D", "id": "113-12"}, {"num": 13, "q": "有關高齡病人問診或溝通時的注意事項，下列何者較不適宜？", "A": "考量病人認知功能或記憶狀況，可以安排親人或朋友在旁陪伴以獲得更多訊息", "B": "為使病人不要過度疲勞，第一次會談就收集到完整病史資訊是很重要的溝通技巧", "C": "病人有時會從很久之前的病史開始敘述，應適度提醒聚焦在現在的主要問題上", "D": "考量病人的舒適與尊嚴，會談時說話速度應稍慢些，並適時詢問語速是否過快", "year": 113, "ans": "B", "id": "113-13"}, {"num": 14, "q": "80歲重度失智女性病人因嚴重肺炎住院，目前持續高燒、呼吸費力且意識不清，醫師建議 做肺部電腦斷層檢查，2位兒子對此意見不一，大兒子質疑檢查的必要性及不想再讓媽媽 接受不必要的醫療，但小兒子則認為不應該放棄任何醫療的努力。下列何者是解決此困境 之最佳處理方式？", "A": "重度失智合併嚴重肺炎且危及生命，符合安寧緩和治療要件，應聽從大兒子意見，不再", "B": "2 位兒子在民法上代理決策地位相等，為把握治療時效，先請小兒子簽同意書然後安排", "C": "雙方意見不一致，可由主治醫師召開家庭會議，解釋病情變化、檢查理由及後續可能的", "D": "基於病人自主，雖然病人重度失智，仍應由病人簽署檢查同意書，才能讓病人主動配合", "year": 113, "ans": "C", "id": "113-14"}, {"num": 15, "q": "SBAR是一種有效改善溝通的方法，可以提升跨醫療專業之間溝通的有效性。有關SBAR 之定義及內容敘述，下列何者錯誤？", "A": "S ( situation )：想要溝通的問題與傳達的情況", "B": "B ( background )：客觀資料，如病人過去病史或檢查數據", "C": "A ( assessment )：依據目前的資料所作的專業評估", "D": "R ( reconstruction )：未來遇到類似問題時可以如何處理", "year": 113, "ans": "D", "id": "113-15"}, {"num": 16, "q": "依據米勒(Miller,1990)臨床技能評估之金字塔結構，下列何者不是評量「做(does)」臨床 能力的方式？", "A": "情境模擬教學", "B": "迷你臨床演練評量 ( mini - CEX )", "C": "直接觀察型技術評量法 ( DOPS )", "D": "多元回饋 - 360 度評估", "year": 113, "ans": "A", "id": "113-16"}, {"num": 17, "q": "有關客觀結構式臨床技能測驗(OSCE)的敘述，下列何者錯誤？", "A": "OSCE 具有資源重複循環使用之經濟效益", "B": "可使用相同或類似臨床場景重複進行測驗", "C": "標準化病人可提供學習者及教學者回饋", "D": "護理專業常用於身體檢查與評量技能考試", "year": 113, "ans": "A", "id": "113-17"}, {"num": 18, "q": "有關保障病人隱私權維護規範，下列敘述何者錯誤？", "A": "把病人手術過程上傳社群媒體，若將臉部影像隱碼屬不違法", "B": "診療過程醫病任一方有錄影及錄音需求時，均須徵得對方同意", "C": "病人接受醫療、診治或檢查時，有權要求不相關人士不得在場", "D": "教學醫院接受醫學院（校）學生臨床見習、實習，而有實習醫師在場，病人不得予以拒絕", "year": 113, "ans": "A", "id": "113-18"}, {"num": 19, "q": "依據民國112年6月 28日修正「傳染病防治法」對於傳染病病人隔離治療與強制送醫之 規定，下列敘述何者正確？", "A": "主管機關不得限制病人", "B": "須徵得家屬同意", "C": "不須徵得病人同意", "D": "須通知社工共同執行", "year": 113, "ans": "C", "id": "113-19"}, {"num": 20, "q": "依據民國110年6月9日修正之「長期照顧服務法」，下列何者不是長照服務所提供之服務 方式？", "A": "視訊諮詢照護", "B": "社區式日間照護", "C": "到宅服務居家式", "D": "機構住宿式", "year": 113, "ans": "A", "id": "113-20"}, {"num": 21, "q": "依據民國110年1月20日「病人自主權利法」所規範之「預立醫療決定」簽署，下列何者 錯誤？", "A": "預立醫療決定書完成後註記於全民健康保險憑證，即具有撤除維生醫療之效力", "B": "具完全行為能力者，得為預立醫療決定，並得隨時以書面撤回或變更之", "C": "須經醫療機構提供預立醫療照護諮商，並經其於預立醫療決定上核章證明", "D": "須經公證人公證或有具完全行為能力者二人以上在場見證", "year": 113, "ans": "A", "id": "113-21"}, {"num": 22, "q": "專科護理師以病人熟悉可理解的語言進行疾病衛教，屬於下列何種倫理原則？", "A": "公平正義", "B": "不傷害", "C": "尊重自主", "D": "行善", "year": 113, "ans": "A", "id": "113-22"}, {"num": 23, "q": "依據Jonsen等人提出的臨床倫理思辨四象限，在評估阿茲海默症病人是否應接受鼻胃管 置入以提供人工灌食營養品時，考量家屬的想法、照顧能力及環境因素，是屬於何種象限 的評估範圍？", "A": "醫療適應性", "B": "病人偏好", "C": "生活品質", "D": "情境特徵", "year": 113, "ans": "D", "id": "113-23"}, {"num": 24, "q": "依據民國112年6月26日「專科護理師分科及甄審辦法」，下列何者不在其規範範圍？", "A": "分科及參訓資格", "B": "訓練醫院之資格及申請方式", "C": "薪資結構與標準", "D": "證書及更新", "year": 113, "ans": "C", "id": "113-24"}, {"num": 25, "q": "依據民國113年1月1日施行「醫療事故預防及爭議處理法」，有關醫療爭議處理的敘述， 下列何者正確？", "A": "處理程序中，醫療機構可以拒絕提供病人的病歷資料", "B": "可以透過調解、仲裁或訴訟等多種方式進行", "C": "處理必須在法院中進行，不可選擇其他方式", "D": "調解成功後，仍然需要經過法院的最終審判", "year": 113, "ans": "B", "id": "113-25"}, {"num": 26, "q": "依據民國110年1月20日修訂「安寧緩和醫療條例」，下列敘述何者正確？", "A": "安寧緩和醫療只能在專門的安寧療護機構中提供，其他醫療機構不得提供此服務", "B": "病人必須經過家屬同意，才能接受安寧緩和醫療服務", "C": "安寧緩和醫療的主要目的是延長病人生命", "D": "醫療機構必須告知病人及其家屬有關安寧緩和醫療的選擇，並尊重病人的自主決定", "year": 113, "ans": "D", "id": "113-26"}, {"num": 27, "q": "依據民國110年1月20日修訂「病人自主權利法」的精神，下列敘述何者正確？", "A": "病人在無行為能力時，不可以預立醫療決定", "B": "醫療機構必須在病人表達不同意維生醫療時，應立即停止，不需進一步確認病人意願", "C": "病人預立醫療指示必須經過書面確認，並且至少需要 2 名見證人簽署，其中 1 名見證人", "D": "若病人無法表達意願，醫療機構可以自行決定是否進行延命治療", "year": 113, "ans": "A", "id": "113-27"}, {"num": 28, "q": "小虹是精神科訓練期間專科護理師（以下簡稱訓練專師），支援內科病房時，照顧的癌症 病人靜脈硬化嚴重，在醫師指示下為病人從鎖骨下插置中心靜脈導管(CVC)，醫師考量 小虹經驗不足，全程在旁監督。下列敘述何者正確？", "A": "不可置放，因其為訓練專師", "B": "不可置放，因其非醫師監督下可執行之醫療處置", "C": "可以置放，因醫師全程在旁監督", "D": "可以置放，因訓練專師和執業專師可執行侵入性醫療處置之項目相同", "year": 113, "ans": "B", "id": "113-28"}, {"num": 29, "q": "依據民國112年6月21日修正「護理人員法」規範，專科護理師與護理師執業最大的差異 是專科護理師可執行下列何項？", "A": "健康問題之護理評估", "B": "護理指導及諮詢", "C": "預防保健之護理措施", "D": "於醫師監督下執行醫療業務", "year": 113, "ans": "D", "id": "113-29"}, {"num": 30, "q": "使用GRADE評核系統審查一篇隨機對照試驗，因研究對象流失過多，且未進行意向性 分析(intention-to-treat analysis)，可依據下列何項因素考慮予以降級？", "A": "偏差風險", "B": "不一致性", "C": "不直接性", "D": "不精確性", "year": 113, "ans": "A", "id": "113-30"}, {"num": 31, "q": "國民健康署推動長者整合性照護功能評估(integrated care for older people,ICOPE)，協助 及早篩檢失能風險因子。下列何項不屬於篩檢的關鍵指標？", "A": "認知功能", "B": "疼痛管理", "C": "憂鬱", "D": "視力", "year": 113, "ans": "B", "id": "113-31"}, {"num": 32, "q": "下列哪一項最不會影響特定疾病篩檢檢驗的陽性預測值(PPV)和陰性預測值(NPV)？", "A": "敏感度 ( sensitivity )", "B": "特異性 ( specificity )", "C": "風險率 ( risk ratio )", "D": "疾病盛行率 ( prevalence )", "year": 113, "ans": "C", "id": "113-32"}, {"num": 33, "q": "若一位年輕人有藥物濫用的傾向，下列介入措施何者最具預防成效？", "A": "建立支持性社交網絡，提供心理諮詢和健康教育課程，並鼓勵參加體育或社區活動", "B": "給予其大量藥物濫用危害的資料，讓其自行閱讀並理解", "C": "向其詳細解釋藥物濫用的法律後果，並威脅如果繼續使用將面臨法律制裁", "D": "建議其每天參加高強度運動訓練，以消耗其多餘的精力", "year": 113, "ans": "A", "id": "113-33"}, {"num": 34, "q": "依據Pender的健康促進模式，協助一位缺乏健康行為改變動力的亞健康個案，下列何者 最具行為改變之成效？", "A": "嚴格要求個案每天進行 1 小時的高強度運動，並監督其執行", "B": "提供健康行為好處與成功案例，並設定可達成的小目標來增強個案自我效能感", "C": "告訴個案如果不改變生活方式，將來會面臨嚴重的健康問題", "D": "規範個案參加每週的健康講座，並要求其記錄學習筆記", "year": 113, "ans": "B", "id": "113-34"}, {"num": 35, "q": "聯合國大會通過永續發展目標(SDGs)中明訂2030年孕產婦死亡率應低於10萬分之70， 依據臨床照護品質指標制定及評量之定義，此項目標屬於下列何種面向？", "A": "介入面", "B": "過程面", "C": "結構面", "D": "結果面", "year": 113, "ans": "D", "id": "113-35"}, {"num": 36, "q": "依據民國98年7月8日修正「優生保健法」人工流產之施行情事，不包括下列何者？", "A": "配偶罹患有礙優生之遺傳性疾病", "B": "五等親親屬患有礙優生之傳染性疾病", "C": "醫學認定分娩將危害其精神健康之診斷證明", "D": "害怕懷孕會加劇脊柱變形之軟骨病者", "year": 113, "ans": "B", "id": "113-36"}, {"num": 37, "q": "有關乳癌早期診斷之敘述，下列何者錯誤？", "A": "國民健康署補助 45 歲以上婦女每年一次乳房 X 光攝影", "B": "乳房超音波檢查不具有放射線傷害，適用於懷孕中的婦女", "C": "高攝影品質的檢查有助於乳癌早期診斷，可提高存活率", "D": "以細針抽吸細胞學檢查法所證實有惡性細胞，可確立診斷乳癌", "year": 113, "ans": "A", "id": "113-37"}, {"num": 38, "q": "依據國民健康署代謝症候群之判定標準，不包括下列何者？", "A": "高血壓", "B": "三酸甘油脂", "C": "低密度膽固醇", "D": "空腹血糖", "year": 113, "ans": "C", "id": "113-38"}, {"num": 39, "q": "專科護理師設計一個研究來了解每日使用chlorhexidine為加護病房病人床上沐浴，是否 可以降低病人發生中心靜脈導管相關血流感染的發生率，如果運用PICO(P:population; I:intervention;C:comparison;O:outcome)臨床提問來檢視這個研究題目，下列敘述何者 錯誤？", "A": "P：加護病房病人", "B": "I：使用 chlorhexidine 床上沐浴", "C": "C：一般病房病人", "D": "O：中心靜脈導管感染", "year": 113, "ans": "C", "id": "113-39"}, {"num": 40, "q": "有關實證5A步驟的順序，下列何者正確？ ① 評讀文獻 ( appraise ) ② 起疑提問 ( ask ) ③ 搜尋文獻 ( acquire ) ④ 推動方案 ( action ) ⑤ 實際運用 ( apply ) ⑥ 過程稽核 ( audit )", "A": "②③①④⑤", "B": "②③①⑤⑥", "C": "④②③①⑥", "D": "⑤②③⑥④", "year": 113, "ans": "B", "id": "113-40"}, {"num": 41, "q": "有關文獻檢索技巧的敘述，下列何者正確？", "A": "使用 MeSH terms tree搜尋結果，無法顯示關鍵字間的層級關係", "B": "交集「OR」、聯集「AND」和刪除「NOT」是布林邏輯中最常使用的運算元", "C": "“ Filter ”是指可以限定搜尋的文獻類型、出版日期或性別等，確立檢索的範圍", "D": "“ Trucation ”是指在關鍵字後面插入「*」的符號，可進一步縮小檢索的範圍", "year": 113, "ans": "C", "id": "113-41"}, {"num": 42, "q": "健康照護品質模式指標(Donabedian,1966)分為結構面、過程面與結果面三大類，下列何者 不屬於「結果面」的指標？", "A": "生活品質", "B": "滿意度調查", "C": "壓瘡發生率", "D": "衛教指導完成率", "year": 113, "ans": "D", "id": "113-42"}, {"num": 43, "q": "下列何者不是臺灣臨床成效指標計畫(Taiwan clinical performance indicator)所監測之綜合 照護指標項目？", "A": "一般病房管路滑脫率", "B": "壓力性損傷發生率", "C": "非計畫性重返加護病房率", "D": "病歷紀錄書寫完整率", "year": 113, "ans": "D", "id": "113-43"}, {"num": 44, "q": "依據疾病管制署公布之中心導管組合式照護工作手冊，下列何者不是中心導管組合式照護 措施所包含之項目？", "A": "每日評估是否拔除導管 ( daily review of line necessity )", "B": "消毒注射帽 ( scrub the hub )", "C": "更換延長管等輸液裝置 ( replacement of administration sets )", "D": "定期更換導管 ( central line replacement )", "year": 113, "ans": "D", "id": "113-44"}, {"num": 45, "q": "「跌倒發生率」為病人安全監測重要指標，下列敘述何者最不適當？", "A": "計算公式為當月發生有紀錄的跌倒事件數 / 當月住院總人日數 × 1000 ‰", "B": "經通報為重度傷害案件，需進行根本原因分析", "C": "指病人於住院期間內，記錄於相關文件之跌倒事件發生狀況", "D": "護理品質指標種類中歸屬於「結果面」指標", "year": 113, "ans": "A", "id": "113-45"}, {"num": 46, "q": "依據「財團法人醫院評鑑暨醫療品質策進會」疾病照護品質認證標準，下列何者不為 心衰竭(HF)結果面向之品質指標？", "A": "HF 病人出院後 14 天內 ( 含 ) 非計畫性再住院", "B": "HF 病人出院後 6 個月内 ( 含 ) 非計畫性再住院", "C": "住院中死亡率 ( 含病危自動出院 )", "D": "HF 病人接受血液 BNP 或 NT - proBNP 檢查比率", "year": 113, "ans": "D", "id": "113-46"}, {"num": 47, "q": "下列何者不是肺高壓病人執行身體診察和檢驗檢查常見的發現？", "A": "心電圖心軸右偏，出現右束支傳導阻滯", "B": "心尖聽到響亮的第三心音，左心室明顯鼓起", "C": "肝頸反流 ( hepatojugular reflux ) 測試呈陽性", "D": "動脈血液氣體分析 PaO", "year": 113, "ans": "B", "id": "113-47"}, {"num": 48, "q": "36歲男性因疲倦、持續發燒2週而入院，雙側呼吸音為爆裂音(crackles)，胸部X光浸潤， 有心雜音，評估手指尖端發紅且疼痛，口腔黏膜有紫紅色斑點，白血球(WBC)12000/uL、 血色素(Hb)8.8g/dL，下列何者為最可能的疾病？", "A": "亞急性心包膜炎 ( subacute pericarditis )", "B": "自體免疫性血管炎 ( autoimmune vasculitis )", "C": "社區型肺炎 ( community - acquired pneumonia )", "D": "細菌性心內膜炎 ( bacterial endocarditis )", "year": 113, "ans": "D", "id": "113-48"}, {"num": 49, "q": "70歲男性，近1個月出現漸進性呼吸困難和體重減輕，胸部X光呈現雙側肺野瀰漫性網格 狀影像，心臟大小正常，右上肺葉有一空洞性病灶，最可能的臨床臆斷為何？", "A": "慢性阻塞性肺疾病", "B": "肺纖維化合併肺結核", "C": "非小細胞肺癌", "D": "原發性肺膿瘍", "year": 113, "ans": "B", "id": "113-49"}, {"num": 50, "q": "45歲女性因突發性呼吸困難和胸痛入院，胸部X光顯示右側肺野局部透亮度增加、右側 主肺動脈擴大、右側少量胸腔積液，緊鄰肋膜出現楔型高密度呈像，最可能的臨床臆斷 為何？", "A": "肺結核", "B": "肺炎", "C": "肺栓塞", "D": "心包積液", "year": 113, "ans": "C", "id": "113-50"}, {"num": 51, "q": "有關裡急後重(tenesmus)之敘述，下列何者正確？", "A": "指病人一有想要排便的感覺時，即無法控制地讓糞便排出", "B": "與腸壁的「蠕動反射」( peristaltic reflex ) 有關", "C": "指的是胃在進食後胃壁擴張，誘發結腸蠕動增加的一種生理反射", "D": "除了直腸本身相關的疾病外，下段輸尿管結石阻塞也會誘發裡急後重", "year": 113, "ans": "D", "id": "113-51"}, {"num": 52, "q": "50歲女性，無過去病史，因持續右上腹痛、發燒就診，身體檢查無明顯壓痛，墨菲氏徵象 (Murphy's sign)陰性，抽血呈現黃疸。下列何者為最可能的臆斷？", "A": "急性膽囊炎", "B": "總膽管結石", "C": "急性胰臟炎", "D": "急性闌尾炎", "year": 113, "ans": "B", "id": "113-52"}, {"num": 53, "q": "45歲女性因持續右下腹痛和發燒就診，醫師欲鑑別急性闌尾炎與急性憩室炎。下列哪種 檢查最為適當？", "A": "大腸鏡檢查", "B": "抽血檢驗相關生物標記 ( biomarker )", "C": "超音波檢查", "D": "電腦斷層檢查", "year": 113, "ans": "D", "id": "113-53"}, {"num": 54, "q": "下列何者不是帕金森氏症(Parkinson's disease)的三大典型症狀？", "A": "癲癇發作", "B": "震顫", "C": "動作緩慢", "D": "肢體僵硬", "year": 113, "ans": "A", "id": "113-54"}, {"num": 55, "q": "下列有關缺血性腦中風病人緊急治療的血壓評估及處置，何者較不適當？", "A": "已使用血栓溶解劑者，血壓 200 / 110 mmHg：使用降血壓藥物", "B": "已使用血栓溶解劑者，血壓 170 / 100 mmHg：使用降血壓藥物", "C": "未使用血栓溶解劑者，血壓 210 / 110 mmHg：觀察追蹤即可", "D": "未使用血栓溶解劑者，血壓 230 / 130 mmHg：使用降血壓藥物", "year": 113, "ans": "B", "id": "113-55"}, {"num": 56, "q": "65歲男性因記憶力下降、語言障礙和行為改變就診。下列何者與其表現相關性較小？", "A": "重症肌無力", "B": "維他命缺乏", "C": "多次腦中風", "D": "水腦症", "year": 113, "ans": "A", "id": "113-56"}, {"num": 57, "q": "下列何者不是甲狀腺機能亢進的常見症
